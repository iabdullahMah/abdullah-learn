<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="learn" />
  <meta name="theme-color" id="theme-color-meta" content="#0a0a0c" />
  <meta name="description" content="Page not found — abdullah-learn." />

  <script>
    (function () {
      try {
        var stored = localStorage.getItem('theme');
        var sysLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
        var effective = stored || (sysLight ? 'light' : 'dark');
        var bg = effective === 'light' ? '#f7f5ef' : '#0a0a0c';
        var root = document.documentElement;
        if (stored === 'dark' || stored === 'light') {
          root.setAttribute('data-theme', stored);
        }
        root.classList.remove(effective === 'light' ? 'theme-dark'  : 'theme-light');
        root.classList.add(   effective === 'light' ? 'theme-light' : 'theme-dark');
        root.style.backgroundColor = bg;
        var meta = document.getElementById('theme-color-meta');
        if (meta) meta.setAttribute('content', bg);
      } catch (e) {}
    })();
  </script>

  <title>404 — abdullah-learn</title>

  <link rel="apple-touch-icon" href="/assets/icon-180.png" />
  <link rel="icon" type="image/svg+xml" href="/assets/icon.svg" />
  <link rel="manifest" href="/manifest.webmanifest" />

  <link rel="stylesheet" href="/assets/shared.css?v=4" />

  <style>
    .wrap {
      width: 100%;
      max-width: 640px;
      margin: 0 auto;
      padding: 48px 24px 64px;
      text-align: center;
    }

    .big {
      font-family: var(--font-display);
      font-style: italic;
      font-weight: 400;
      font-size: clamp(96px, 30vw, 180px);
      line-height: 1;
      letter-spacing: -0.02em;
      color: var(--fg);
      margin: 0 0 8px;
    }

    .note {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--fg-muted);
      letter-spacing: 0.03em;
      margin: 0 0 32px;
    }

    .home {
      display: inline-flex;
      align-items: center;
      min-height: var(--tap);
      padding: 0 18px;
      border: 1px solid var(--border-strong);
      border-radius: 999px;
      color: var(--fg);
      font-family: var(--font-mono);
      font-size: 13px;
      letter-spacing: 0.03em;
    }
    .home:active { background: var(--bg-card-hover); }
  </style>
</head>
<body>
  <main class="wrap">
    <h1 class="big">404</h1>
    <p class="note">this page hasn’t been written yet.</p>
    <a class="home" href="/">← back to index</a>
  </main>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/sw.js').catch(function () {});
      });
    }
  </script>
</body>
</html>
