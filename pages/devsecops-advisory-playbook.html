<!-- Theme boot: apply before stylesheet so there's no FOUC -->

<script>
(function () {
  try {
    var stored = localStorage.getItem('theme');
    var sysLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
    var effective = stored || (sysLight ? 'light' : 'dark');
    var bg = effective === 'light' ? '#f7f5ef' : '#0a0a0c';
    var root = document.documentElement;
    if (stored === 'dark' || stored === 'light') {
      root.setAttribute('data-theme', stored);
    }
    root.classList.remove(effective === 'light' ? 'theme-dark'  : 'theme-light');
    root.classList.add(   effective === 'light' ? 'theme-light' : 'theme-dark');
    root.style.backgroundColor = bg;
    var meta = document.getElementById('theme-color-meta');
    if (meta) meta.setAttribute('content', bg);
  } catch (e) {}
})();
</script>

<style>
  /* ========== Local scope — uses only shared.css vars + devsecops accent ========== */
  :root {
    --accent: #ec4899;                   /* devsecops pink */
    --accent-soft: rgba(236, 72, 153, 0.14);
    --accent-border: rgba(236, 72, 153, 0.32);
    --accent-filter: none;

    --ok: #2dd4bf;
    --ok-soft: rgba(45, 212, 191, 0.12);
    --ok-border: rgba(45, 212, 191, 0.32);
    --warn: #f59e0b;
    --warn-soft: rgba(245, 158, 11, 0.12);
    --warn-border: rgba(245, 158, 11, 0.32);
    --bad: #ef4444;
    --bad-soft: rgba(239, 68, 68, 0.12);
    --bad-border: rgba(239, 68, 68, 0.32);
    --info: #38bdf8;
    --info-soft: rgba(56, 189, 248, 0.12);
    --info-border: rgba(56, 189, 248, 0.32);
    --purple: #a78bfa;
    --purple-soft: rgba(167, 139, 250, 0.12);
    --purple-border: rgba(167, 139, 250, 0.32);

    --tap: 44px;
  }
  @media (prefers-color-scheme: light) {
    :root:not([data-theme="dark"]) {
      --accent-filter: saturate(1.12) brightness(0.88);
    }
  }
  :root[data-theme="light"] {
    --accent-filter: saturate(1.12) brightness(0.88);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    margin: 0;
    min-height: 100dvh;
    background: var(--bg);
    color: var(--fg);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    padding:
      env(safe-area-inset-top)
      env(safe-area-inset-right)
      env(safe-area-inset-bottom)
      env(safe-area-inset-left);
  }

  /* ---------- Shell ---------- */
  .shell {
    max-width: 980px;
    margin: 0 auto;
    padding: 14px 18px 96px;
  }

  a.back, button.back {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    min-height: var(--tap);
    padding: 10px 2px;
    color: var(--fg-muted);
    font-family: var(--font-mono);
    font-size: 12px;
    text-decoration: none;
    letter-spacing: 0.02em;
    background: none; border: 0; cursor: pointer;
  }
  a.back:hover, button.back:hover { color: var(--fg); }

  .meta-row {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 14px;
    margin-bottom: 16px;
  }
  .cat-badge {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 5px 11px 5px 10px;
    border: 1px solid var(--border);
    background: var(--bg-raised);
    border-radius: 999px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--fg-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .cat-badge .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    filter: var(--accent-filter);
  }
  .date {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--fg-subtle);
  }

  h1.title {
    font-family: var(--font-display);
    font-weight: 400;
    font-size: clamp(2rem, 7vw, 3.4rem);
    line-height: 1.02;
    letter-spacing: -0.015em;
    margin: 0 0 16px;
    color: var(--fg);
  }
  h1.title em {
    font-style: italic;
    color: var(--accent);
    filter: var(--accent-filter);
  }

  p.lead {
    font-size: 1.02rem;
    line-height: 1.6;
    color: var(--fg-muted);
    max-width: 64ch;
    margin: 0 0 22px;
  }

  /* ---------- Sticky section nav ---------- */
  .navwrap {
    position: sticky;
    top: env(safe-area-inset-top);
    z-index: 30;
    margin: 14px -18px 22px;
    background: color-mix(in srgb, var(--bg) 88%, transparent);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .navscroll {
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    scroll-snap-type: x proximity;
    scrollbar-width: none;
    padding: 9px 18px;
  }
  .navscroll::-webkit-scrollbar { display: none; }
  .navrow {
    display: inline-flex;
    gap: 6px;
  }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    min-height: var(--tap);
    padding: 7px 13px;
    border: 1px solid var(--border);
    background: var(--bg-raised);
    border-radius: 999px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--fg-muted);
    white-space: nowrap;
    cursor: pointer;
    scroll-snap-align: start;
    transition: transform 0.1s, color 0.15s, background 0.15s, border-color 0.15s;
  }
  .chip:active { transform: scale(0.96); }
  .chip.active {
    color: var(--accent);
    border-color: var(--accent-border);
    background: var(--accent-soft);
    filter: var(--accent-filter);
  }
  .chip .num {
    font-size: 10px;
    opacity: 0.7;
  }

  /* ---------- Section headings ---------- */
  h2.section {
    font-family: var(--font-display);
    font-weight: 400;
    font-size: clamp(1.6rem, 5vw, 2.15rem);
    line-height: 1.12;
    letter-spacing: -0.01em;
    margin: 4px 0 14px;
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  h2.section em {
    font-style: italic;
    color: var(--accent);
    filter: var(--accent-filter);
  }
  h2.section .idx {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    color: var(--fg-subtle);
    text-transform: uppercase;
    flex-shrink: 0;
  }
  h3.sub {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    filter: var(--accent-filter);
    margin: 26px 0 10px;
  }
  h4.subsub {
    font-family: var(--font-display);
    font-style: italic;
    font-size: 1.18rem;
    font-weight: 400;
    color: var(--fg);
    margin: 20px 0 8px;
  }

  p { font-size: 0.98rem; line-height: 1.62; color: var(--fg-muted); margin: 0 0 12px; }
  p strong, li strong { color: var(--fg); font-weight: 600; }

  hr.divider {
    border: 0;
    border-top: 1px solid var(--border);
    margin: 24px 0;
  }

  /* ---------- Lists ---------- */
  ul.bullets {
    list-style: none;
    padding: 0;
    margin: 6px 0 14px;
  }
  ul.bullets li {
    position: relative;
    padding-left: 18px;
    margin-bottom: 8px;
    font-size: 0.94rem;
    line-height: 1.55;
    color: var(--fg-muted);
  }
  ul.bullets li::before {
    content: "▸";
    position: absolute;
    left: 0; top: 1px;
    color: var(--accent);
    filter: var(--accent-filter);
    font-size: 10px;
  }
  ol.numbered {
    list-style: none;
    counter-reset: step;
    padding: 0;
    margin: 6px 0 14px;
  }
  ol.numbered li {
    counter-increment: step;
    position: relative;
    padding-left: 32px;
    margin-bottom: 10px;
    font-size: 0.94rem;
    line-height: 1.55;
    color: var(--fg-muted);
  }
  ol.numbered li::before {
    content: counter(step);
    position: absolute;
    left: 0; top: 0;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--accent-soft);
    color: var(--accent);
    filter: var(--accent-filter);
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  /* ---------- Callouts ---------- */
  .callout {
    border: 1px solid var(--accent-border);
    background: var(--accent-soft);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin: 14px 0;
  }
  .callout .label {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    filter: var(--accent-filter);
    font-weight: 600;
    margin-bottom: 6px;
  }
  .callout p { color: var(--fg); margin: 0; }
  .callout.ok    { border-color: var(--ok-border);   background: var(--ok-soft); }
  .callout.ok    .label { color: var(--ok); filter: none; }
  .callout.warn  { border-color: var(--warn-border); background: var(--warn-soft); }
  .callout.warn  .label { color: var(--warn); filter: none; }
  .callout.bad   { border-color: var(--bad-border);  background: var(--bad-soft); }
  .callout.bad   .label { color: var(--bad); filter: none; }
  .callout.info  { border-color: var(--info-border); background: var(--info-soft); }
  .callout.info  .label { color: var(--info); filter: none; }

  /* ---------- Scenario boxes (normal / attack) ---------- */
  .scenarios { display: grid; gap: 10px; grid-template-columns: 1fr; margin: 14px 0; }
  @media (min-width: 640px) { .scenarios { grid-template-columns: 1fr 1fr; } }
  .scenario {
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    background: var(--bg-card);
  }
  .scenario.normal { border-color: var(--ok-border); background: var(--ok-soft); }
  .scenario.attack { border-color: var(--bad-border); background: var(--bad-soft); }
  .scenario .lbl {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 6px;
    display: block;
  }
  .scenario.normal .lbl { color: var(--ok); }
  .scenario.attack .lbl { color: var(--bad); }
  .scenario p { font-size: 0.9rem; color: var(--fg); margin: 0; }

  /* ---------- Collapsibles ---------- */
  .collapsible {
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg-card);
    margin-bottom: 10px;
    overflow: hidden;
  }
  .collapsible .toggle {
    width: 100%;
    min-height: var(--tap);
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    background: transparent;
    border: 0;
    color: var(--fg);
    font-family: var(--font-body);
    font-size: 0.94rem;
    font-weight: 500;
    text-align: left;
    cursor: pointer;
  }
  .collapsible .toggle:hover { background: var(--bg-card-hover); }
  .collapsible .caret {
    display: inline-block;
    color: var(--accent);
    filter: var(--accent-filter);
    font-size: 11px;
    transition: transform 0.15s;
    width: 12px;
    flex-shrink: 0;
  }
  .collapsible.open .caret { transform: rotate(90deg); }
  .collapsible .titletxt { flex: 1; min-width: 0; }
  .collapsible .tag {
    margin-left: auto;
    padding: 3px 8px;
    border-radius: 999px;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: var(--bg-raised);
    border: 1px solid var(--border);
    color: var(--fg-muted);
  }
  .collapsible .tag.red    { color: var(--bad);    border-color: var(--bad-border);    background: var(--bad-soft); }
  .collapsible .tag.amber  { color: var(--warn);   border-color: var(--warn-border);   background: var(--warn-soft); }
  .collapsible .tag.green  { color: var(--ok);     border-color: var(--ok-border);     background: var(--ok-soft); }
  .collapsible .tag.blue   { color: var(--info);   border-color: var(--info-border);   background: var(--info-soft); }
  .collapsible .tag.purple { color: var(--purple); border-color: var(--purple-border); background: var(--purple-soft); }
  .collapsible .tag.pink   { color: var(--accent); filter: var(--accent-filter); border-color: var(--accent-border); background: var(--accent-soft); }
  .collapsible .body {
    padding: 4px 14px 14px;
    border-top: 1px solid var(--border);
  }

  /* ---------- Tables ---------- */
  .tbl-wrap {
    margin: 12px 0;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  table {
    width: 100%;
    min-width: 500px;
    border-collapse: collapse;
    font-size: 0.88rem;
  }
  th, td {
    padding: 10px 12px;
    text-align: left;
    vertical-align: top;
    border-bottom: 1px solid var(--border);
  }
  th {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    filter: var(--accent-filter);
    background: var(--bg-raised);
    font-weight: 600;
  }
  td { color: var(--fg-muted); }
  td:first-child { color: var(--fg); }
  tr:last-child td { border-bottom: 0; }

  /* ---------- Pipeline stage ---------- */
  .stage {
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg-card);
    margin-bottom: 10px;
    overflow: hidden;
  }
  .stage .head {
    width: 100%;
    min-height: var(--tap);
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    background: transparent;
    border: 0;
    color: var(--fg);
    text-align: left;
    cursor: pointer;
    font-family: var(--font-body);
  }
  .stage .head:hover { background: var(--bg-card-hover); }
  .stage .num {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--accent-soft);
    border: 1px solid var(--accent-border);
    color: var(--accent);
    filter: var(--accent-filter);
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .stage .title-wrap {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .stage .s-title {
    font-weight: 600;
    font-size: 0.96rem;
    color: var(--fg);
  }
  .stage .s-gate {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--fg-muted);
  }
  .stage .caret {
    color: var(--accent);
    filter: var(--accent-filter);
    font-size: 11px;
    transition: transform 0.15s;
    flex-shrink: 0;
  }
  .stage.open .caret { transform: rotate(90deg); }
  .stage .body {
    padding: 10px 14px 14px 58px;
    border-top: 1px solid var(--border);
  }
  .stage .tools {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin: 8px 0;
  }
  .stage .fail {
    display: flex;
    gap: 8px;
    align-items: baseline;
    font-size: 0.88rem;
    margin: 8px 0;
    flex-wrap: wrap;
  }
  .stage .fail .lbl {
    color: var(--bad);
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 600;
    flex-shrink: 0;
  }
  .stage .fail span:not(.lbl) { color: var(--fg); }
  .stage .good {
    margin-top: 10px;
    padding: 10px 12px;
    border: 1px solid var(--ok-border);
    background: var(--ok-soft);
    border-radius: var(--radius-sm);
  }
  .stage .good .lbl {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ok);
    font-weight: 600;
    display: block;
    margin-bottom: 4px;
  }
  .stage .good .txt {
    font-size: 0.9rem;
    color: var(--fg);
    line-height: 1.55;
  }

  /* ---------- Clickable glossary term ---------- */
  .tlink {
    background: none;
    border: 0;
    padding: 0;
    font: inherit;
    color: var(--accent);
    filter: var(--accent-filter);
    cursor: pointer;
    font-weight: 500;
    border-bottom: 1px dotted var(--accent-border);
    text-decoration: none;
  }
  .tlink:active, .tlink:focus-visible {
    border-bottom-style: solid;
    outline: none;
  }

  /* ---------- Maturity ladder ---------- */
  .maturity { display: flex; flex-direction: column; gap: 8px; margin: 12px 0; }
  .m-item {
    display: flex;
    gap: 12px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg-card);
  }
  .m-item .ml {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    color: var(--fg);
    flex-shrink: 0;
    width: 76px;
  }
  .m-item .md {
    font-size: 0.88rem;
    color: var(--fg-muted);
    line-height: 1.5;
  }
  .m-item.l0 { border-color: var(--bad-border);    background: var(--bad-soft); }
  .m-item.l1 { border-color: var(--warn-border);   background: var(--warn-soft); }
  .m-item.l2 { border-color: rgba(234, 179, 8, 0.32); background: rgba(234, 179, 8, 0.08); }
  .m-item.l3 { border-color: var(--info-border);   background: var(--info-soft); }
  .m-item.l4 { border-color: var(--ok-border);     background: var(--ok-soft); }

  /* ---------- Dimension grid ---------- */
  .dimgrid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
    margin: 12px 0;
  }
  @media (min-width: 600px) { .dimgrid { grid-template-columns: 1fr 1fr; } }
  .dim {
    border: 1px solid var(--border);
    background: var(--bg-card);
    border-radius: var(--radius-sm);
    padding: 12px;
  }
  .dim .n {
    font-family: var(--font-display);
    font-style: italic;
    font-size: 1.02rem;
    color: var(--accent);
    filter: var(--accent-filter);
    margin-bottom: 4px;
  }
  .dim .d { font-size: 0.88rem; color: var(--fg-muted); line-height: 1.55; }

  /* ---------- Glossary ---------- */
  .g-search-wrap {
    position: sticky;
    top: 60px;
    z-index: 20;
    margin: 0 -18px 10px;
    padding: 10px 18px;
    background: color-mix(in srgb, var(--bg) 92%, transparent);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
  }
  .g-search {
    width: 100%;
    min-height: var(--tap);
    padding: 10px 14px;
    background: var(--bg-raised);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--fg);
    font-family: var(--font-body);
    font-size: 16px; /* prevent iOS zoom */
    outline: none;
  }
  .g-search:focus {
    border-color: var(--accent-border);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .g-cats {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 10px;
  }
  .g-cat {
    display: inline-flex;
    align-items: center;
    min-height: 32px;
    padding: 5px 10px;
    border: 1px solid var(--border);
    background: var(--bg-raised);
    border-radius: 999px;
    color: var(--fg-muted);
    font-family: var(--font-mono);
    font-size: 10.5px;
    letter-spacing: 0.03em;
    cursor: pointer;
    white-space: nowrap;
  }
  .g-cat.active {
    color: var(--accent);
    border-color: var(--accent-border);
    background: var(--accent-soft);
    filter: var(--accent-filter);
  }
  .g-count {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--fg-subtle);
    margin: 10px 0 12px;
  }
  .g-group-head {
    margin: 20px 0 8px;
  }
  .g-group-label {
    display: inline-block;
    padding: 4px 10px;

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback, useMemo, createContext, useContext } = React;

/* ============================================================
   GLOSSARY — concepts, tools, frameworks, compliance
   ============================================================ */
const GLOSSARY = [
  // ── Core concepts ───────────────────────────────────────────
  { id: "devsecops", term: "DevSecOps", cat: "concept",
    short: "Development + Security + Operations",
    long: "A culture and practice of integrating security into every phase of the software development lifecycle, rather than treating it as a final checkpoint. The goal is to make security everyone's responsibility, automate security testing in the CI/CD pipeline, and catch vulnerabilities as early as possible (shift-left)." },
  { id: "devops", term: "DevOps", cat: "concept",
    short: "Development + Operations",
    long: "A set of practices combining software development (Dev) and IT operations (Ops) to shorten the development lifecycle and deliver software continuously. DevSecOps extends this by adding security as a first-class concern from day one." },
  { id: "sdlc", term: "SDLC", cat: "concept",
    short: "Software Development Life Cycle",
    long: "The complete process of planning, creating, testing, deploying, and maintaining software. Phases: requirements → design → implementation → testing → deployment → maintenance. DevSecOps embeds security into every phase." },
  { id: "cicd", term: "CI/CD", aliases: ["CI/CD pipeline","CI/CD pipelines"], cat: "concept",
    short: "Continuous Integration / Continuous Delivery",
    long: "An automated software delivery practice where code changes are frequently merged (CI) and automatically built, tested, and prepared for release (CD). The pipeline is the series of automated steps — build, test, scan, deploy — that code passes through from commit to production." },
  { id: "shift-left", term: "Shift Left", cat: "concept",
    short: "Moving security testing earlier in development",
    long: "Catching vulnerabilities as early as possible — at the developer workstation or during code review, not in staging or production. Pre-commit hooks, IDE plugins, and SAST in pull requests are shift-left practices. Cheaper to fix early." },
  { id: "shift-right", term: "Shift Right", cat: "concept",
    short: "Extending security into production observability",
    long: "Complement to shift-left: also monitor in production for runtime threats, drift, anomalous behaviour, and real-world exploitation. Uses Falco, SIEM, RASP, and fuzzing against staging to catch what pre-prod testing missed." },
  { id: "zero-trust", term: "Zero Trust", cat: "concept",
    short: "Never trust, always verify",
    long: "Security model that assumes no implicit trust based on network location. Every request — even from inside the perimeter — must be authenticated, authorised, and encrypted. Replaces the legacy castle-and-moat model with identity-based access for every resource." },
  { id: "least-privilege", term: "Least Privilege", aliases: ["Principle of Least Privilege","PoLP"], cat: "concept",
    short: "Grant only the minimum access needed",
    long: "A user, service, or process is granted only the permissions strictly required for its function — nothing more. Limits blast radius on compromise. In Kubernetes: non-root containers, read-only filesystems, minimal RBAC roles, no privileged mode." },
  { id: "defense-in-depth", term: "Defense in Depth", cat: "concept",
    short: "Layered security controls",
    long: "Rather than relying on one control, stack multiple overlapping defences so no single failure compromises the system. Example: WAF + input validation + parameterised queries + least-privileged DB user + encrypted storage + monitoring. If one layer fails, others still protect." },
  { id: "immutable-infra", term: "Immutable Infrastructure", cat: "concept",
    short: "Servers/containers are never modified — always replaced",
    long: "Once deployed, a server or container is never patched or reconfigured in place. Changes are made by building a new image and replacing the running instance. Eliminates configuration drift, makes rollback trivial, and simplifies forensics." },
  { id: "gitops", term: "GitOps", cat: "concept",
    short: "Git as the single source of truth for infrastructure",
    long: "Infrastructure and application state declared in git; a controller (Argo CD, Flux) continuously reconciles the cluster to match git. Every change is a PR — reviewed, auditable, reversible. Powerful for Kubernetes-native environments." },
  { id: "supply-chain-security", term: "Supply Chain Security", cat: "concept",
    short: "Protecting the software delivery pipeline integrity",
    long: "Ensuring every component — source code, dependencies, build tools, deployment infrastructure — is trustworthy and untampered. Attacks like SolarWinds, Codecov, and Log4Shell highlighted the need for SBOM generation, artifact signing, and build provenance." },
  { id: "iac", term: "IaC", aliases: ["Infrastructure as Code"], cat: "concept",
    short: "Infrastructure as Code",
    long: "Managing and provisioning infrastructure (servers, networks, databases) through machine-readable definition files rather than manual configuration. Tools like Terraform and CloudFormation let you version-control your infrastructure, review changes via pull requests, and reproduce environments exactly." },
  { id: "policy-as-code", term: "Policy-as-Code", cat: "concept",
    short: "Security/compliance policies defined as executable code",
    long: "Writing security and compliance rules as code (Rego for OPA, YAML for Kyverno) that can be version-controlled, tested, and automatically enforced in CI/CD pipelines. Replaces manual policy checks with automated, consistent enforcement." },
  { id: "quality-gate", term: "Quality Gate", aliases: ["quality gate","quality gates"], cat: "concept",
    short: "Automated pass/fail checkpoint in a CI/CD pipeline",
    long: "A set of conditions code must meet before progressing. Security quality gates might require: zero critical SAST findings, no critical CVEs in dependencies, all container scans passed. If any condition fails, the pipeline stops." },
  { id: "rbac", term: "RBAC", cat: "concept",
    short: "Role-Based Access Control",
    long: "A method of restricting system access based on roles assigned to users. Instead of giving individual permissions, users are assigned roles (admin, developer, viewer) that carry predefined permission sets. In Kubernetes, RBAC controls who can create, modify, or delete resources." },
  { id: "abac", term: "ABAC", cat: "concept",
    short: "Attribute-Based Access Control",
    long: "Access decisions made based on attributes — user attributes (department, clearance), resource attributes (classification, owner), environment attributes (time, location). More granular than RBAC. OPA enables ABAC via Rego policies." },
  { id: "oidc", term: "OIDC", cat: "concept",
    short: "OpenID Connect — identity layer on OAuth 2.0",
    long: "Identity federation protocol built on OAuth 2.0 that provides authentication (not just authorisation). In DevSecOps, OIDC powers keyless signing (Cosign), cloud workload identity (AWS IAM roles for pods), and federated CI/CD (GitHub Actions → AWS without long-lived credentials)." },
  { id: "mtls", term: "mTLS", aliases: ["mutual TLS"], cat: "concept",
    short: "Mutual TLS — both sides authenticate",
    long: "Standard TLS authenticates the server to the client. mTLS adds client-side certificate authentication — each service must present a valid cert. Foundation of zero-trust service-to-service communication, commonly enforced by service meshes (Istio, Linkerd)." },
  { id: "service-mesh", term: "Service Mesh", cat: "concept",
    short: "Dedicated layer for service-to-service communication",
    long: "Infrastructure layer (Istio, Linkerd, Consul) that handles service-to-service traffic — mTLS, retries, load balancing, observability, authorisation policies — without changing application code. Critical for zero-trust microservice architectures." },
  { id: "sast", term: "SAST", cat: "concept",
    short: "Static Application Security Testing",
    long: "Analyses source code, bytecode, or binaries for security vulnerabilities without executing the program. Runs early in the pipeline (at build time) and catches issues like SQL injection patterns, hardcoded credentials, and insecure crypto. Think of it as a spell-checker for security bugs in your code." },
  { id: "sca", term: "SCA", cat: "concept",
    short: "Software Composition Analysis",
    long: "Scans third-party libraries and open-source dependencies for known vulnerabilities (CVEs) and license compliance issues. Since modern applications are 70–90% open-source code, SCA is essential to catch vulnerabilities you didn't write but still ship." },
  { id: "dast", term: "DAST", cat: "concept",
    short: "Dynamic Application Security Testing",
    long: "Tests a running application from the outside by sending crafted HTTP requests and analysing responses for vulnerabilities. Unlike SAST, DAST doesn't need source code — it attacks the live application in staging or QA, finding runtime issues like auth bypasses, injection flaws, and misconfigurations." },
  { id: "iast", term: "IAST", cat: "concept",
    short: "Interactive Application Security Testing",
    long: "Combines elements of SAST and DAST by instrumenting the running application with an agent. The agent monitors code execution in real time during testing, providing precise vulnerability location with very low false positives. Typically used in QA/staging." },
  { id: "rasp", term: "RASP", cat: "concept",
    short: "Runtime Application Self-Protection",
    long: "Security agent embedded in the running application that detects and blocks attacks in real time from inside the process — it sees the full execution context, not just traffic. Unlike a WAF which sees only HTTP, RASP can block SQL injection at the moment the unsafe query is about to execute." },
  { id: "waf", term: "WAF", cat: "concept",
    short: "Web Application Firewall",
    long: "Network/HTTP-layer filter that inspects incoming requests and blocks attacks matching known patterns (SQLi, XSS, path traversal). Cloud WAFs include AWS WAF, Cloudflare, Azure Front Door. Complement to secure coding — not a replacement. Tune carefully to avoid blocking legitimate traffic." },
  { id: "sbom", term: "SBOM", cat: "concept",
    short: "Software Bill of Materials",
    long: "A complete, formally structured inventory of all components, libraries, and dependencies in a piece of software — like a nutrition label for code. Formats include CycloneDX and SPDX. Critical for supply chain security: if a vulnerability is found in a library (like Log4Shell), an SBOM lets you instantly check if you're affected." },
  { id: "slsa", term: "SLSA", cat: "concept",
    short: "Supply-chain Levels for Software Artifacts",
    long: "A security framework (pronounced 'salsa') defining levels of build integrity and provenance. L1 = documented build process; L2 = hosted build platform with signed provenance; L3 = hardened, non-forgeable provenance; L4 = two-person review + reproducible builds. Addresses supply chain attacks by requiring recorded provenance and hardened build platforms." },
  { id: "cspm", term: "CSPM", cat: "concept",
    short: "Cloud Security Posture Management",
    long: "Continuously assesses cloud configurations (AWS, Azure, GCP) against security baselines and compliance frameworks. Detects public S3 buckets, open security groups, unencrypted volumes, overly permissive IAM. Tools: Prisma Cloud, Wiz, Lacework, AWS Security Hub." },
  { id: "cwpp", term: "CWPP", cat: "concept",
    short: "Cloud Workload Protection Platform",
    long: "Protects workloads (VMs, containers, serverless) across hybrid and multi-cloud environments. Covers image scanning, runtime protection, host hardening, integrity monitoring. Distinct from CSPM — CWPP focuses on the workload, CSPM on the cloud configuration." },
  { id: "cnapp", term: "CNAPP", cat: "concept",
    short: "Cloud-Native Application Protection Platform",
    long: "Gartner's term for the convergence of CSPM + CWPP + CIEM + IaC scanning + container security into a unified platform. Single pane of glass covering build-time to runtime cloud security. Examples: Wiz, Prisma Cloud, Aqua, Sysdig, Orca." },
  { id: "ciem", term: "CIEM", cat: "concept",
    short: "Cloud Infrastructure Entitlement Management",
    long: "Analyses cloud identity and entitlement — who (user/role/service) can do what on which resource across AWS/Azure/GCP. Finds overprivileged identities, unused permissions, toxic combinations, and helps right-size IAM policies toward least privilege." },
  { id: "siem", term: "SIEM", cat: "concept",
    short: "Security Information and Event Management",
    long: "Aggregates and analyses security log data from across the infrastructure in real time. SIEMs (Splunk, Elastic Security, Microsoft Sentinel, Chronicle) correlate events from multiple sources to detect threats, generate alerts, and support incident investigation." },
  { id: "soar", term: "SOAR", cat: "concept",
    short: "Security Orchestration, Automation and Response",
    long: "Platforms that automate incident response workflows. When a SIEM detects a threat, SOAR can automatically execute a playbook — isolating a compromised container, blocking an IP, creating a ticket — without manual intervention." },
  { id: "cve", term: "CVE", aliases: ["CVEs"], cat: "concept",
    short: "Common Vulnerabilities and Exposures",
    long: "A standardised identifier for publicly known security vulnerabilities (e.g., CVE-2021-44228 is Log4Shell). Each CVE gets a severity score (CVSS). SCA tools check your dependencies against CVE databases to find known vulnerabilities." },
  { id: "cvss", term: "CVSS", cat: "concept",
    short: "Common Vulnerability Scoring System",
    long: "Open standard for rating vulnerability severity on a 0–10 scale. Base metrics consider attack vector, complexity, privileges, user interaction, and impact on CIA. CVSS v3.1 is the current norm; v4.0 adds environmental/temporal precision. Used to prioritise remediation." },
  { id: "epss", term: "EPSS", cat: "concept",
    short: "Exploit Prediction Scoring System",
    long: "Probability score (0–1) estimating how likely a vulnerability will be exploited in the wild within 30 days. Complements CVSS: CVSS says how bad it COULD be; EPSS says how likely it IS to be attacked. Useful for prioritising patching when CVSS scores are all 'critical'." },
  { id: "kev", term: "KEV", cat: "concept",
    short: "Known Exploited Vulnerabilities (CISA catalogue)",
    long: "CISA-maintained list of vulnerabilities confirmed to be actively exploited. Federal agencies must patch KEV-listed vulns within set deadlines. Best-in-class prioritisation: patch KEV first, then high-CVSS/high-EPSS, then the rest." },
  { id: "vuln-triage", term: "Vulnerability Triage", cat: "concept",
    short: "Prioritising vulnerabilities for remediation",
    long: "Process of deciding which vulnerabilities to fix first. Good triage considers: CVSS score, EPSS probability, KEV status, reachability (is the vulnerable code actually called?), exposure (internet-facing?), business impact, and compensating controls. Prevents alert fatigue." },
  { id: "false-positive", term: "False Positive", aliases: ["False positives","false positives"], cat: "concept",
    short: "Scanner incorrectly flagging safe code as vulnerable",
    long: "When a tool reports a vulnerability that doesn't exist. High false positive rates cause alert fatigue — developers ignore findings. Good practice includes tool tuning, baselines, and a triage process that suppresses known non-issues." },
  { id: "mttr", term: "MTTR", cat: "concept",
    short: "Mean Time to Remediate",
    long: "The average time between discovering a vulnerability and deploying a fix to production. A key DevSecOps KPI. Typically tracked by severity: critical vulns might target 24-hour MTTR, medium vulns 30 days." },
  { id: "mttd", term: "MTTD", cat: "concept",
    short: "Mean Time to Detect",
    long: "Average time from when a threat or vulnerability is introduced until it is discovered. Paired with MTTR — together they describe end-to-end detection-and-response performance. Good telemetry drives MTTD down; good remediation workflow drives MTTR down." },
  { id: "vuln-escape-rate", term: "Vulnerability Escape Rate", cat: "concept",
    short: "% of vulnerabilities reaching production uncaught",
    long: "Key metric measuring pipeline gate effectiveness. If 100 vulns exist and 15 reach prod, escape rate is 15%. Lower is better — your pipeline catches more before deployment." },
  { id: "cis-benchmarks", term: "CIS Benchmarks", cat: "concept",
    short: "Center for Internet Security configuration standards",
    long: "Consensus-based, best-practice security configuration guides for operating systems, cloud providers, databases, and applications. They define specific hardening settings (disable root SSH, enforce password complexity) as a baseline. Used by most compliance frameworks." },
  { id: "golden-image", term: "Golden Image", aliases: ["golden images","golden base images"], cat: "concept",
    short: "Pre-approved, hardened base container/VM image",
    long: "A centrally maintained, security-hardened base image that all teams must use. Rebuilt regularly (typically weekly) with latest OS patches, unnecessary packages removed, CIS benchmarks applied, non-root user set. Ensures every container starts from a known-secure foundation." },
  { id: "microsegmentation", term: "Microsegmentation", cat: "concept",
    short: "Granular network isolation between services",
    long: "Dividing a network into very small, isolated segments so each service can only communicate with specific services it needs. In Kubernetes, implemented via Network Policies. If one service is compromised, lateral movement is blocked." },
  { id: "network-policies", term: "Network Policies", aliases: ["Network policies","network policies"], cat: "concept",
    short: "Kubernetes rules controlling pod-to-pod traffic",
    long: "Kubernetes resources defining which pods can communicate. By default all pods can talk to all others. Network policies restrict this — e.g., only frontend talks to API, only API talks to database. Requires a CNI that enforces them (Calico, Cilium)." },
  { id: "taint-analysis", term: "Taint Analysis", cat: "concept",
    short: "Tracking untrusted data flow through application code",
    long: "A SAST technique that traces user-controlled input ('tainted' data) through code to see if it reaches security-sensitive functions (SQL queries, system commands) without sanitisation. Deep taint analysis follows data across functions and files — what distinguishes enterprise SAST from pattern matching." },
  { id: "admission-controller", term: "Admission Controller", aliases: ["Admission Controllers","admission controllers"], cat: "concept",
    short: "Kubernetes gatekeeper validating resources before creation",
    long: "Code that intercepts requests to the Kubernetes API server before resources are persisted. Can validate (reject non-compliant) or mutate (add defaults). OPA/Gatekeeper and Kyverno are popular policy-based admission controllers." },
  { id: "container-drift", term: "Container Drift Detection", aliases: ["Container drift detection","drift detection"], cat: "concept",
    short: "Detecting unauthorised changes to running containers",
    long: "Monitoring running containers for modifications not in the original image — new binaries, changed configs, unexpected processes. Drift indicates compromise or undocumented manual changes, both violating immutable infrastructure principles." },
  { id: "security-champion", term: "Security Champion", aliases: ["Security Champions","security champions"], cat: "concept",
    short: "Developer serving as team security point-person",
    long: "A development team member with extra security training who bridges security and development teams. Reviews security-sensitive changes, advocates secure coding, escalates concerns. Remains a developer first — not a full-time security role. Scales security without needing one security person per team." },
  { id: "threat-modelling", term: "Threat Modelling", aliases: ["Threat Modeling"], cat: "concept",
    short: "Systematic identification of potential threats",
    long: "A structured design-phase process for identifying what can go wrong. Methods include STRIDE (Spoofing, Tampering, Repudiation, Information Disclosure, DoS, Elevation of Privilege) and PASTA. Output: prioritised threats with recommended mitigations." },
  { id: "pre-commit-hook", term: "Pre-commit Hook", aliases: ["Pre-commit hooks","pre-commit hooks"], cat: "concept",
    short: "Script running automatically before a git commit",
    long: "A git hook executing checks before code is committed. Security uses: scanning for hardcoded secrets (Gitleaks), running security linters, checking for large binaries. If problems are found, the commit is blocked." },
  { id: "branch-protection", term: "Branch Protection", cat: "concept",
    short: "Rules restricting how code merges to important branches",
    long: "Git platform settings preventing direct pushes to critical branches (main/master), requiring PR reviews and CI checks to pass. Ensures all changes go through review and automated testing." },
  { id: "codeowners", term: "CODEOWNERS", cat: "concept",
    short: "File defining required reviewers for code paths",
    long: "A repository file mapping file paths to required reviewers. Security use: require security team approval for changes to authentication modules, crypto code, CI/CD configs, and Dockerfiles." },
  { id: "gpg-signing", term: "GPG Signing", aliases: ["GPG-signed commits","Signed commits"], cat: "concept",
    short: "Cryptographically signing git commits for authorship proof",
    long: "Using GPG keys (or SSH signing) to digitally sign commits, proving the commit was made by the claimed author and hasn't been tampered with. Without signing, anyone with repo access could forge commits under another's name." },
  { id: "secrets-rotation", term: "Secrets Rotation", cat: "concept",
    short: "Regularly replacing credentials to limit exposure window",
    long: "Automatic periodic replacement of API keys, DB passwords, and tokens. Reduces risk that leaked credentials remain valid. Vault and AWS Secrets Manager rotate some secrets automatically; others require application cooperation (e.g., dual-credential rotation windows)." },
  { id: "opa", term: "OPA", aliases: ["Open Policy Agent","OPA/Gatekeeper"], cat: "concept",
    short: "Open Policy Agent",
    long: "A general-purpose policy engine for unified, context-aware policy enforcement. In Kubernetes, OPA runs as an admission controller (via Gatekeeper) that evaluates every resource against policies written in Rego language. Example: block privileged containers, enforce resource limits, require specific labels." },
  { id: "rego", term: "Rego", cat: "concept",
    short: "Policy language used by OPA",
    long: "A declarative query language for writing policies. Example: 'deny any pod requesting privileged mode' or 'require all containers to have resource limits.' Used with OPA/Gatekeeper for Kubernetes admission control and IaC scanning (Terrascan, KICS)." },
  { id: "gitflow", term: "GitFlow", cat: "concept",
    short: "Branching model with develop, feature, release, hotfix branches",
    long: "A structured branching strategy with dedicated branches: develop for ongoing work, feature/* for new features, release/* for preparation, hotfix/* for urgent fixes. More complex than trunk-based but provides clear release management — common in enterprise." },
  { id: "trunk-based", term: "Trunk-based Development", aliases: ["trunk-based"], cat: "concept",
    short: "All developers commit to a single main branch frequently",
    long: "A strategy where all developers commit to trunk (main) frequently using short-lived branches (hours to days). Requires strong CI/CD and automated testing. Considered best practice for high-performing teams." },
  { id: "feature-branches", term: "Feature Branches", aliases: ["feature branches"], cat: "concept",
    short: "Isolated branches for individual features",
    long: "Creating a separate branch per feature, developing in isolation, then merging via pull request. Keeps main stable and allows code review. Risk: long-lived branches that diverge significantly." },

  // ── CI/CD Platforms ─────────────────────────────────────────
  { id: "jenkins", term: "Jenkins", cat: "tool-cicd",
    short: "Open-source CI/CD automation server",
    long: "The most widely adopted open-source CI/CD server. 1800+ plugins. Pipelines in Jenkinsfiles (Groovy). Self-hosted — you manage infrastructure. Very flexible but requires significant maintenance and security hardening." },
  { id: "gitlab-ci", term: "GitLab CI", cat: "tool-cicd",
    short: "CI/CD built into GitLab",
    long: "GitLab's integrated CI/CD. Pipelines in .gitlab-ci.yml. Runs on GitLab Runners (self-hosted or shared). Tightly integrated with GitLab's code review, issue tracking, and container registry." },
  { id: "github-actions", term: "GitHub Actions", cat: "tool-cicd",
    short: "CI/CD automation built into GitHub",
    long: "GitHub's native CI/CD. Workflows in YAML under .github/workflows/. Huge marketplace of community actions. Tight integration with PRs, code scanning, and Dependabot. Supports OIDC for keyless cloud auth." },
  { id: "azure-devops", term: "Azure DevOps", cat: "tool-cicd",
    short: "Microsoft's DevOps platform",
    long: "Microsoft's suite: Azure Pipelines (CI/CD), Repos (git), Boards (PM), Artifacts (packages). Supports YAML and classic UI pipelines. Strong Azure cloud integration." },
  { id: "bamboo", term: "Bamboo", cat: "tool-cicd",
    short: "Atlassian's CI/CD server",
    long: "Atlassian's CI/CD product, integrated with Jira and Bitbucket. Web UI-based (not YAML). Self-hosted only. Being gradually sunset in favour of Bitbucket Pipelines." },
  { id: "circleci", term: "CircleCI", cat: "tool-cicd",
    short: "Cloud-native CI/CD platform",
    long: "Popular cloud-based CI/CD known for fast builds and Docker-first approach. YAML config (.circleci/config.yml). Supports orbs — reusable configuration packages." },

/* ============================================================
   Nav context — lets <T> jump to glossary
   ============================================================ */
const NavContext = createContext(null);
const useNav = () => useContext(NavContext);

/* Clickable glossary term */
function T({ id, children }) {
  const nav = useNav();
  const entry = GLOSSARY.find(g => g.id === id);
  if (!entry) return <span>{children || id}</span>;
  return (
    <button
      type="button"
      className="tlink"
      onClick={() => nav && nav.goToTerm(id)}
      title={entry.term + ": " + entry.short}
    >
      {children || entry.term}
    </button>
  );
}

/* ============================================================
   Reusable primitives
   ============================================================ */
function Collapsible({ title, tag, tagColor, defaultOpen, children }) {
  const [open, setOpen] = useState(!!defaultOpen);
  return (
    <div className={"collapsible" + (open ? " open" : "")}>
      <button type="button" className="toggle" onClick={() => setOpen(o => !o)}>
        <span className="caret">▶</span>
        <span className="titletxt">{title}</span>
        {tag && <span className={"tag " + (tagColor || "")}>{tag}</span>}
      </button>
      {open && <div className="body">{children}</div>}
    </div>
  );
}

function BulletList({ items }) {
  return (
    <ul className="bullets">
      {items.map((it, i) => <li key={i}>{it}</li>)}
    </ul>
  );
}
function NumList({ items }) {
  return (
    <ol className="numbered">
      {items.map((it, i) => <li key={i}>{it}</li>)}
    </ol>
  );
}
function Table({ headers, rows }) {
  return (
    <div className="tbl-wrap">
      <table>
        <thead>
          <tr>{headers.map((h, i) => <th key={i}>{h}</th>)}</tr>
        </thead>
        <tbody>
          {rows.map((r, i) => (
            <tr key={i}>
              {r.map((c, j) => <td key={j}>{c}</td>)}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

/* ============================================================

function Foundations() {

      <h2 className="section"><span className="idx">01</span><span>Foundations</span></h2>
      <p><T id="devsecops" /> is not a tool, a title, or a team — it is a way of building software where security is designed in from day one. The shorthand is <T id="shift-left">shift-left</T>: catch problems at the developer's keyboard instead of during a panicked triage after production is on fire.</p>

      <div className="callout info">
        <div className="label">Mental model</div>
        <p>Old world: build the app → throw it over the wall → security scans at the end → findings arrive weeks late → nobody fixes them. DevSecOps world: every commit is scanned, every dependency is tracked, every deployment is signed, every container is watched. Security is an invisible co-author, not a gatekeeper.</p>
      </div>

      <h3 className="sub">Why it exists</h3>
      <BulletList items={[
        <span>Modern apps are <strong>70–90% open-source code</strong>. You didn't write most of what you ship — you assembled it. <T id="sca" /> and <T id="sbom" /> tell you what's actually in the box.</span>,
        <span>Deployment frequency has exploded. Quarterly releases became weekly, then daily, then every merge. Manual security review doesn't fit. <T id="cicd" /> pipelines must scan automatically or they don't scan at all.</span>,
        <span>Cloud-native stacks (<T id="iac" />, containers, Kubernetes) moved configuration into code. Misconfigurations are now code bugs — scan them like code.</span>,
        <span>Attackers moved up the stack. Supply-chain attacks (SolarWinds, Codecov, xz-utils) target the pipeline itself. <T id="supply-chain-security" /> is a first-class concern.</span>,
      ]} />

      <h3 className="sub">Core principles</h3>
      <div className="dimgrid">
        <div className="dim"><div className="n">Shift-left</div><div className="d">Detect issues as early as the IDE and pre-commit hook. Cheapest place to fix — the second it becomes a merged PR, cost multiplies.</div></div>
        <div className="dim"><div className="n">Shift-right</div><div className="d">Keep watching in production. Runtime detection catches what pre-prod scans miss. <T id="falco" />, <T id="siem" />, <T id="rasp" />.</div></div>
        <div className="dim"><div className="n">Automate everything</div><div className="d">If a human has to remember to run it, it won't run. Every gate lives in the pipeline as code.</div></div>
        <div className="dim"><div className="n">Fail fast, fail loud</div><div className="d"><T id="quality-gate">Quality gates</T> block the pipeline on critical findings. Don't just log — prevent.</div></div>
        <div className="dim"><div className="n">Least privilege</div><div className="d"><T id="least-privilege" /> everywhere — IAM, <T id="rbac" />, service accounts, CI/CD runners, container users.</div></div>
        <div className="dim"><div className="n">Defense in depth</div><div className="d"><T id="defense-in-depth" /> — WAF + input validation + parameterised queries + scoped DB users + encryption + monitoring. No single point of failure.</div></div>
        <div className="dim"><div className="n">Zero trust</div><div className="d"><T id="zero-trust" /> — no implicit trust. Every request authenticated. <T id="mtls" /> between services.</div></div>
        <div className="dim"><div className="n">Immutable infra</div><div className="d"><T id="immutable-infra" /> — never SSH in and edit. Rebuild and replace. Eliminates drift.</div></div>
      </div>

      <h3 className="sub">DevOps vs DevSecOps</h3>
      <Table
        headers={["Dimension", "DevOps", "DevSecOps"]}
        rows={[
          ["Goal", "Ship faster, reliably", "Ship faster, reliably, securely"],
          ["Security ownership", "Separate security team", "Shared — devs + sec + ops"],
          ["Testing", "Build + unit + integration", <span>Above + <T id="sast" />, <T id="sca" />, <T id="dast" />, container, IaC, secrets</span>],
          ["Gates", "Build, test pass", <span>Above + <T id="quality-gate">security gates</T></span>],
          ["Response", "Incident post-mortem", <span>Threat modelling → runtime detection → <T id="soar" /> automation</span>],
        ]}
      />

      <h3 className="sub">The cost curve</h3>
      <div className="callout warn">
        <div className="label">Why shift-left matters</div>
        <p>Industry studies (IBM, NIST, Ponemon) show fixing a bug in production costs roughly <strong>100×</strong> what it costs in the design phase. A hardcoded secret caught by a <T id="pre-commit-hook" /> takes seconds to fix. The same secret discovered after it leaked on GitHub takes hours of rotation, audit, and disclosure.</p>
      </div>

      <h3 className="sub">Cultural pillars</h3>
      <NumList items={[
        <span><strong>Security is everyone's job.</strong> Developers own the code they write, including its security posture. <T id="security-champion">Security champions</T> bridge teams without centralising responsibility.</span>,

/* ============================================================
   SECTION: Glossary
   ============================================================ */
function Glossary() {
  const [search, setSearch] = useState("");
  const [catFilter, setCatFilter] = useState("all");
  const [hlId, setHlId] = useState(null);
  const nav = useNav();
  const refs = useRef({});

  useEffect(() => {
    if (!nav || !nav.pendingTermId) return;
    const id = nav.pendingTermId;
    setSearch("");
    setCatFilter("all");
    setHlId(id);

    // Cancel any in-flight smooth scrolls from section-change by doing an
    // instant jump to current position first, then wait for layout to settle
    // (search clear, filter reset, DOM commit), then smooth-scroll to the term.
    let raf1, raf2;
    const t1 = setTimeout(() => {
      raf1 = requestAnimationFrame(() => {
        raf2 = requestAnimationFrame(() => {
          const el = refs.current[id];
          if (el) {
            const navwrap = document.querySelector(".navwrap");
            const gsearch = document.querySelector(".g-search-wrap");
            const navH = navwrap ? navwrap.getBoundingClientRect().height : 0;
            const gH   = gsearch ? gsearch.getBoundingClientRect().height : 0;
            const offset = navH + gH + 16;
            const rect = el.getBoundingClientRect();
            const targetY = window.scrollY + rect.top - offset;
            window.scrollTo({ top: Math.max(0, targetY), behavior: "smooth" });
          }
          nav.clearPendingTerm();
        });
      });
    }, 150);

    const t2 = setTimeout(() => setHlId(null), 3200);
    return () => {
      clearTimeout(t1);
      clearTimeout(t2);
      if (raf1) cancelAnimationFrame(raf1);
      if (raf2) cancelAnimationFrame(raf2);
    };
  }, [nav && nav.pendingTermId]);

  const cats = useMemo(() => {
    const seen = new Set(GLOSSARY.map(g => g.cat));
    return ["all", ...Array.from(seen)];
  }, []);

  const filtered = useMemo(() => {
    const q = search.trim().toLowerCase();
    return GLOSSARY.filter(g => {
      if (catFilter !== "all" && g.cat !== catFilter) return false;
      if (!q) return true;
      if (g.term.toLowerCase().includes(q)) return true;
      if (g.short.toLowerCase().includes(q)) return true;
      if (g.long.toLowerCase().includes(q)) return true;
      if (g.aliases && g.aliases.some(a => a.toLowerCase().includes(q))) return true;
      return false;
    });
  }, [search, catFilter]);

  const grouped = useMemo(() => {
    const g = {};
    filtered.forEach(e => { (g[e.cat] = g[e.cat] || []).push(e); });
    return g;
  }, [filtered]);

  return (
    <section>
      <h2 className="section"><span className="idx">06</span><span>Glossary</span></h2>
      <p>Every concept, tool, framework, and compliance standard in one place. Tap any <span className="tlink" style={{cursor:"default"}}>highlighted term</span> anywhere in the playbook to jump here.</p>

      <div className="g-search-wrap">
        <input
          type="text"
          className="g-search"
          placeholder="Search terms, tools, concepts…"
          value={search}
          onChange={e => setSearch(e.target.value)}
          autoComplete="off"
          autoCorrect="off"
          autoCapitalize="off"
          spellCheck="false"
        />
        <div className="g-cats">
          {cats.map(c => {
            const count = c === "all" ? GLOSSARY.length : GLOSSARY.filter(g => g.cat === c).length;
            const label = c === "all" ? "All" : (CAT_LABELS[c] || c);
            return (
              <button
                key={c}
                type="button"
                className={"g-cat" + (catFilter === c ? " active" : "")}
                onClick={() => setCatFilter(c)}
              >
                {label} <span style={{opacity: 0.6, marginLeft: 4}}>{count}</span>
              </button>
            );
          })}
        </div>
      </div>

      <div className="g-count">{filtered.length} of {GLOSSARY.length} entries</div>

      {Object.entries(grouped).map(([cat, entries]) => (
        <div key={cat}>
          <div className="g-group-head">
            <span className="g-group-label">{CAT_LABELS[cat] || cat}</span>
          </div>
          {entries.map(e => (
            <div
              key={e.id}
              ref={el => { refs.current[e.id] = el; }}
              className={"g-entry" + (hlId === e.id ? " hl" : "")}
            >
              <div>
                <span className="term">{e.term}</span>
                <span className="short">— {e.short}</span>
              </div>
              <p className="long">{e.long}</p>
              {e.aliases && e.aliases.length > 0 && (
                <div className="aliases">
                  <span className="alabel">Also:</span>
                  {e.aliases.map(a => <span key={a} className="alias">{a}</span>)}
                </div>
              )}
            </div>
          ))}
        </div>
      ))}

      {filtered.length === 0 && (
        <div className="g-empty">No matches. Try different search terms or clear filters.</div>
      )}
    </section>
  );
}

/* ============================================================
   APP
   ============================================================ */
function App() {
  const [active, setActive] = useState("foundations");
  const [pendingTermId, setPendingTermId] = useState(null);
  const pendingRef = useRef(null); // mirror of pendingTermId that doesn't trigger effects
  const mainRef = useRef(null);

  const goToTerm = useCallback(id => {
    pendingRef.current = id;
    setPendingTermId(id);
    setActive("glossary");
  }, []);
  const clearPendingTerm = useCallback(() => {
    pendingRef.current = null;
    setPendingTermId(null);
  }, []);

  useEffect(() => {
    // Only scroll-to-top when switching sections WITHOUT a pending term jump.
    // Read from ref so that clearing pendingTermId later does NOT retrigger this.
    if (pendingRef.current) return;
    window.scrollTo({ top: 0, behavior: "smooth" });
  }, [active]);

  const nav = useMemo(() => ({ goToTerm, pendingTermId, clearPendingTerm }), [goToTerm, pendingTermId, clearPendingTerm]);

  const renderSection = () => {
    switch (active) {
      case "foundations": return <Foundations />;
      case "frameworks":  return <Frameworks />;
      case "pipeline":    return <Pipeline />;
      case "tools":       return <Tools />;
      case "metrics":     return <Metrics />;
      case "glossary":    return <Glossary />;
      default:            return <Foundations />;
    }
  };

  const activeIdx = SECTIONS.findIndex(s => s.id === active);

  return (
    <NavContext.Provider value={nav}>
      <div className="shell" ref={mainRef}>
        <a href="/" className="back">← index</a>
        <div className="meta-row">
          <span className="cat-badge"><span className="dot"></span>devsecops</span>
          <span className="date">2026-04-16</span>
        </div>
        <h1 className="title">DevSecOps <em>Playbook</em></h1>
        <p className="lead">A personal reference for building security into the <T id="sdlc" />. Foundations, <T id="dsovs" /> + <T id="dsomm" /> frameworks, pipeline stage-by-stage, tool catalogue, and KPIs. Every concept and tool is cross-linked to the glossary.</p>

        <div className="tags">
          {["devsecops","dsovs","dsomm","owasp","cicd","advisory","framework"].map(t => (
            <a key={t} className="tag" data-tag={t} href={"/?tag=" + encodeURIComponent(t)}>{t}</a>
          ))}
        </div>

        <div className="navwrap">
          <div className="navscroll">
            <div className="navrow">
              {SECTIONS.map((s, i) => (
                <button
                  key={s.id}
                  type="button"
                  className={"chip" + (active === s.id ? " active" : "")}
                  onClick={() => setActive(s.id)}
                >
                  <span className="num">{String(i + 1).padStart(2, "0")}</span>
                  <span>{s.label}</span>
                </button>
              ))}
            </div>
          </div>
        </div>

        {renderSection()}

        <div className="foot">
          {activeIdx > 0 ? (
            <button type="button" className="linkbtn" onClick={() => setActive(SECTIONS[activeIdx - 1].id)}>
              ← {SECTIONS[activeIdx - 1].label}
            </button>
          ) : <span />}
          {activeIdx < SECTIONS.length - 1 ? (
            <button type="button" className="linkbtn next" onClick={() => setActive(SECTIONS[activeIdx + 1].id)}>
              {SECTIONS[activeIdx + 1].label} →
            </button>
          ) : <span />}
        </div>
      </div>
    </NavContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
