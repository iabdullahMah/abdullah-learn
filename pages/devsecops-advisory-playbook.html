<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DevSecOps Advisory">
<meta name="theme-color" content="#030712">
<link rel="apple-touch-icon" href="/assets/icon-180.png">
<link rel="manifest" href="/manifest.webmanifest">

<title>DevSecOps Advisory Playbook — abdullah-learn</title>
<meta name="description" content="A security consultant's playbook for overseeing a DevSecOps gap assessment. OWASP DSOVS &amp; DSOMM, full CI/CD pipeline reference, 100+ term glossary.">

<link rel="stylesheet" href="/assets/shared.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
:root {
  --bg: #030712;
  --bg-2: #0b1020;
  --bg-card: rgba(255,255,255,0.05);
  --bg-card-hover: rgba(255,255,255,0.08);
  --bg-row: rgba(255,255,255,0.03);
  --border: rgba(255,255,255,0.1);
  --border-2: rgba(255,255,255,0.15);
  --border-3: rgba(255,255,255,0.2);
  --text: #f3f4f6;
  --text-2: #e5e7eb;
  --text-3: #d1d5db;
  --text-4: #9ca3af;
  --text-5: #6b7280;
  --text-6: #4b5563;
  --amber: #fbbf24;
  --amber-500: #f59e0b;
  --amber-dim: rgba(251,191,36,0.15);
  --amber-border: rgba(251,191,36,0.3);
  --amber-accent: rgba(251,191,36,0.05);
  --amber-accent-border: rgba(251,191,36,0.4);
  --emerald: #34d399;
  --emerald-dim: rgba(52,211,153,0.15);
  --emerald-border: rgba(52,211,153,0.3);
  --red: #f87171;
  --red-dim: rgba(248,113,113,0.15);
  --red-border: rgba(248,113,113,0.3);
  --sky: #38bdf8;
  --sky-dim: rgba(56,189,248,0.15);
  --sky-border: rgba(56,189,248,0.3);
  --violet: #a78bfa;
  --violet-dim: rgba(167,139,250,0.15);
  --violet-border: rgba(167,139,250,0.3);
  --rose: #fb7185;
  --rose-dim: rgba(251,113,133,0.15);
  --orange: #fb923c;
  --orange-dim: rgba(251,146,60,0.15);
  --cyan: #22d3ee;
  --cyan-dim: rgba(34,211,238,0.15);
  --teal: #2dd4bf;
  --teal-dim: rgba(45,212,191,0.15);
  --pink: #ec4899;
  --pink-400: #f472b6;
  --pink-dim: rgba(236,72,153,0.15);
  --lime: #a3e635;
  --lime-dim: rgba(163,230,53,0.15);
  --indigo: #818cf8;
  --indigo-dim: rgba(129,140,248,0.15);
  --yellow: #facc15;
  --yellow-dim: rgba(250,204,21,0.15);
  --fuchsia: #e879f9;
  --fuchsia-dim: rgba(232,121,249,0.15);
  --blue: #60a5fa;
  --blue-dim: rgba(96,165,250,0.15);
  --sans: 'DM Sans', sans-serif;
  --mono: 'JetBrains Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { background: var(--bg); -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100dvh;
  padding-left: env(safe-area-inset-left);
  padding-right: env(safe-area-inset-right);
}
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 3px; }

/* Top bar */
.topbar {
  padding: max(12px, env(safe-area-inset-top)) 20px 0;
  max-width: 960px;
  margin: 0 auto;
}
.back-link {
  display: inline-flex;
  align-items: center;
  min-height: 44px;
  padding: 0 12px 0 0;
  color: var(--text-4);
  text-decoration: none;
  font-size: 13px;
  gap: 6px;
}
.back-link::before { content: '←'; font-size: 1.2em; }
.back-link:hover { color: var(--amber); }

/* Loading */
.loading {
  padding: 80px 20px;
  text-align: center;
  color: var(--text-5);
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 2px;
}

/* App container */
.app { max-width: 960px; margin: 0 auto; padding: 0 20px max(40px, calc(40px + env(safe-area-inset-bottom))); }

/* Hero */
.hero { padding: 16px 0 24px; border-bottom: 1px solid var(--border); margin-bottom: 0; }
.hero-brand { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.hero-icon {
  width: 36px; height: 36px; border-radius: 8px;
  background: var(--amber-dim); border: 1px solid var(--amber-border);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.hero h1 {
  font-size: clamp(22px, 3.5vw + 0.5rem, 28px);
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text);
  line-height: 1.2;
}
.hero-tag { font-size: 12px; color: var(--text-5); margin-top: 2px; }

/* Sticky section nav */
.section-nav {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(3,7,18,0.94);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  margin: 0 -20px 24px;
  padding: 8px 20px;
  padding-top: max(8px, env(safe-area-inset-top));
}
.section-nav-inner {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scroll-snap-type: x proximity;
  scrollbar-width: none;
  max-width: 920px;
  margin: 0 auto;
}
.section-nav-inner::-webkit-scrollbar { display: none; }
.section-nav a {
  display: inline-flex;
  align-items: center;
  min-height: 44px;
  padding: 0 14px;
  border-radius: 8px;
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--text-4);
  text-decoration: none;
  border: 1px solid transparent;
  white-space: nowrap;
  scroll-snap-align: start;
  flex-shrink: 0;
  gap: 6px;
}
.section-nav a:hover {
  color: var(--text);
  background: var(--bg-card);
  border-color: var(--border-2);
}
.section-nav a.active {
  color: var(--amber);
  background: var(--amber-dim);
  border-color: var(--amber-border);
}
.section-nav a .nav-emoji { font-size: 1em; }

/* Sections */
.section {
  padding: 32px 0 40px;
  scroll-margin-top: 80px;
  border-bottom: 1px solid var(--border);
}
.section:last-of-type { border-bottom: none; }

.section-title {
  font-size: clamp(18px, 2vw + 0.5rem, 22px);
  font-weight: 700;
  color: var(--text);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  line-height: 1.25;
}
.section-title::before {
  content: '';
  width: 4px;
  height: 22px;
  background: var(--amber-500);
  border-radius: 2px;
  flex-shrink: 0;
}

.sub-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--amber);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin: 24px 0 10px;
}

.prose { font-size: 14px; color: var(--text-3); line-height: 1.7; margin-bottom: 12px; }
.prose strong { color: var(--text); font-weight: 600; }

/* Cards */
.card {
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  padding: 16px;
  margin-bottom: 12px;
}
.card.accent { border-color: var(--amber-accent-border); background: var(--amber-accent); }
.card.danger { border-color: var(--red-border); background: rgba(248,113,113,0.04); }
.card-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.card-head .card-icon { font-size: 16px; }
.card-head .card-label { font-size: 13px; font-weight: 700; }
.card-head .card-label.green { color: var(--emerald); }
.card-head .card-label.red { color: var(--red); }

.card-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
  margin: 12px 0;
}
@media (min-width: 640px) { .card-grid.two { grid-template-columns: 1fr 1fr; } }
@media (min-width: 720px) { .card-grid.three { grid-template-columns: 1fr 1fr 1fr; } }
.card-grid .card { margin-bottom: 0; }

/* Chips */
.chip {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 500;
  border: 1px solid;
  white-space: nowrap;
}
.chip-amber { color: var(--amber); background: var(--amber-dim); border-color: var(--amber-border); }
.chip-red { color: var(--red); background: var(--red-dim); border-color: var(--red-border); }
.chip-green { color: var(--emerald); background: var(--emerald-dim); border-color: var(--emerald-border); }
.chip-blue { color: var(--sky); background: var(--sky-dim); border-color: var(--sky-border); }
.chip-purple { color: var(--violet); background: var(--violet-dim); border-color: var(--violet-border); }
.chip-gray { color: var(--text-3); background: rgba(255,255,255,0.08); border-color: var(--border-2); }

/* Collapsibles */
.collapsible {
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 10px;
}
.collapsible-head {
  width: 100%;
  min-height: 52px;
  padding: 10px 16px;
  background: var(--bg-card);
  border: none;
  text-align: left;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  color: inherit;
  font-family: inherit;
  font-size: inherit;
  transition: background 0.15s;
}
.collapsible-head:hover { background: var(--bg-card-hover); }
.collapsible-head-text {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  flex: 1;
}
.collapsible-head-text .title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-2);
}
.collapsible-arrow {
  color: var(--amber);
  font-size: 12px;
  transition: transform 0.2s;
  display: inline-block;
  flex-shrink: 0;
}
.collapsible-arrow.open { transform: rotate(90deg); }
.collapsible-body {
  padding: 14px 16px 16px;
  border-top: 1px solid var(--border);
  background: rgba(255,255,255,0.02);
}

/* Bullet / numbered lists */
.bullet-list, .numbered-list {
  list-style: none;
  padding: 0;
  margin: 8px 0;
}
.bullet-list li, .numbered-list li {
  display: flex;
  gap: 10px;
  font-size: 14px;
  color: var(--text-3);
  line-height: 1.7;
  margin-bottom: 10px;
}
.bullet-list li::before {
  content: '▸';
  color: var(--amber-500);
  flex-shrink: 0;
  margin-top: 2px;
}
.numbered-list {
  counter-reset: n;
}
.numbered-list li {
  counter-increment: n;
}
.numbered-list li::before {
  content: counter(n);
  color: var(--amber);
  font-family: var(--mono);
  font-size: 11px;
  background: var(--amber-dim);
  border-radius: 50%;
  width: 22px;
  height: 22px;
  min-width: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
}

/* Tables */
.compare-table-wrap {
  margin: 12px 0;
  border-radius: 10px;
  border: 1px solid var(--border);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.compare-table {
  width: 100%;
  font-size: 13px;
  border-collapse: collapse;
  min-width: 400px;
}
.compare-table th {
  padding: 10px 12px;
  text-align: left;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  background: rgba(255,255,255,0.08);
  color: var(--amber);
  border-bottom: 1px solid var(--border);
  font-weight: 700;
}
.compare-table td {
  padding: 10px 12px;
  color: var(--text-3);
  border-bottom: 1px solid rgba(255,255,255,0.04);
  vertical-align: top;
  line-height: 1.6;
}
.compare-table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
.compare-table tr:last-child td { border-bottom: none; }

/* Term links (glossary jump) */
.term-link {
  color: var(--amber);
  text-decoration: underline;
  text-decoration-color: rgba(245,158,11,0.4);
  text-underline-offset: 2px;
  cursor: pointer;
  font-weight: 500;
  transition: color 0.15s, text-decoration-color 0.15s;
}
.term-link:hover {
  color: var(--amber-500);
  text-decoration-color: var(--amber-500);
}

/* Pipeline stages */
.pipeline-stage {
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 8px;
}
.pipeline-head {
  width: 100%;
  min-height: 64px;
  padding: 10px 14px;
  background: var(--bg-card);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 12px;
  color: inherit;
  font-family: inherit;
  font-size: inherit;
  transition: background 0.15s;
  text-align: left;
}
.pipeline-head:hover { background: var(--bg-card-hover); }
.pipeline-num {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: var(--amber-dim);
  border: 1px solid var(--amber-border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 700;
  color: var(--amber);
  flex-shrink: 0;
}
.pipeline-meta { flex: 1; min-width: 0; }
.pipeline-meta-title {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.pipeline-meta-title .title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-2);
}
.pipeline-body {
  padding: 14px;
  border-top: 1px solid var(--border);
  background: rgba(255,255,255,0.02);
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.pipeline-tools {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.pipeline-tools .tool {
  font-family: var(--mono);
  font-size: 11px;
}
.pipeline-fail {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text-3);
}
.pipeline-fail .label {
  color: var(--red);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-size: 11px;
}
.pipeline-good {
  background: rgba(52,211,153,0.06);
  border: 1px solid rgba(52,211,153,0.2);
  border-radius: 8px;
  padding: 12px;
}
.pipeline-good-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--emerald);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 6px;
}
.pipeline-good-text { font-size: 13px; color: var(--text-3); line-height: 1.7; }

/* Maturity level blocks */
.maturity-level {
  border: 1px solid;
  border-radius: 8px;
  padding: 10px 14px;
  margin-bottom: 8px;
}
.maturity-level .label { font-size: 13px; font-weight: 700; color: var(--text); }
.maturity-level .desc { font-size: 12px; color: var(--text-3); margin-top: 2px; }
.maturity-level.red { background: rgba(239,68,68,0.12); border-color: rgba(239,68,68,0.35); }
.maturity-level.orange { background: rgba(249,115,22,0.12); border-color: rgba(249,115,22,0.35); }
.maturity-level.yellow { background: rgba(234,179,8,0.12); border-color: rgba(234,179,8,0.35); }
.maturity-level.emerald { background: rgba(16,185,129,0.12); border-color: rgba(16,185,129,0.35); }

.dsomm-level-row {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  margin-bottom: 10px;
}
.dsomm-level-num {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--amber-dim);
  border: 1px solid var(--amber-border);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--amber);
  font-weight: 700;
  font-size: 12px;
  flex-shrink: 0;
}
.dsomm-level-text .label { font-size: 13px; font-weight: 700; color: var(--text-2); }
.dsomm-level-text .desc { font-size: 12px; color: var(--text-4); }

/* Checklist */
.checklist { display: flex; flex-direction: column; gap: 10px; }
.checklist label {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  cursor: pointer;
  padding: 8px 0;
  min-height: 44px;
}
.checklist input[type="checkbox"] {
  margin-top: 2px;
  width: 18px;
  height: 18px;
  accent-color: var(--amber-500);
  cursor: pointer;
  flex-shrink: 0;
}
.checklist span { font-size: 13px; color: var(--text-3); line-height: 1.6; }

/* Glossary */
.glossary-search {
  position: sticky;
  top: 60px;
  z-index: 50;
  background: rgba(3,7,18,0.94);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  padding: 10px 0 12px;
  margin: 0 -20px;
  padding-left: 20px;
  padding-right: 20px;
}
.glossary-search input {
  width: 100%;
  background: var(--bg-card);
  border: 1px solid var(--border-2);
  border-radius: 10px;
  padding: 12px 16px;
  font-size: 16px; /* 16px to prevent iOS zoom */
  color: var(--text);
  outline: none;
  font-family: inherit;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.glossary-search input::placeholder { color: var(--text-5); }
.glossary-search input:focus {
  border-color: var(--amber-border);
  box-shadow: 0 0 0 3px var(--amber-dim);
}
.glossary-filters {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 10px;
}
.glossary-filter-btn {
  min-height: 36px;
  padding: 0 12px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid;
  background: transparent;
  font-family: inherit;
  opacity: 0.6;
  transition: opacity 0.15s, box-shadow 0.15s;
  display: inline-flex;
  align-items: center;
}
.glossary-filter-btn.active {
  opacity: 1;
  box-shadow: 0 0 0 1px var(--amber-border);
}
.glossary-count { font-size: 11px; color: var(--text-5); margin: 10px 0; }

.glossary-group { margin-bottom: 24px; }
.glossary-group-head {
  margin-bottom: 10px;
}
.glossary-entry {
  border: 1px solid var(--border);
  background: var(--bg-row);
  border-radius: 10px;
  padding: 14px 16px;
  margin-bottom: 8px;
  scroll-margin-top: 140px;
  transition: background 0.2s, border-color 0.2s;
}
.glossary-entry:hover { background: var(--bg-card); }
.glossary-entry:target {
  border-color: var(--amber-500);
  background: rgba(245,158,11,0.12);
  box-shadow: 0 0 0 2px rgba(245,158,11,0.3), 0 0 24px rgba(245,158,11,0.15);
  animation: highlightPulse 2.5s ease;
}
@keyframes highlightPulse {
  0% { background: rgba(245,158,11,0.25); }
  100% { background: rgba(245,158,11,0.12); }
}
.glossary-entry-head {
  display: flex;
  align-items: baseline;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 6px;
}
.glossary-entry-term { font-size: 14px; font-weight: 700; color: var(--text); }
.glossary-entry-short { font-size: 13px; color: var(--amber); font-weight: 500; }
.glossary-entry-short::before { content: '— '; }
.glossary-entry-long { font-size: 12px; color: var(--text-4); line-height: 1.7; }
.glossary-entry-aliases {
  margin-top: 10px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
}
.glossary-entry-aliases .label { font-size: 11px; color: var(--text-6); }
.glossary-entry-aliases .alias {
  font-family: var(--mono);
  font-size: 11px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 2px 7px;
  color: var(--text-5);
}

.glossary-empty {
  text-align: center;
  padding: 40px 16px;
  color: var(--text-5);
}
.glossary-empty p { font-size: 14px; margin-bottom: 4px; }
.glossary-empty p.lg { font-size: 17px; color: var(--text-4); }

/* Back to top */
.btt {
  position: fixed;
  bottom: max(20px, calc(20px + env(safe-area-inset-bottom)));
  right: max(20px, calc(20px + env(safe-area-inset-right)));
  width: 44px;
  height: 44px;
  border-radius: 50%;

<script type="text/babel">
const { useState, useMemo, useRef, useEffect } = React;

const GLOSSARY = [
  { id: "cicd", term: "CI/CD", aliases: ["CI/CD pipeline","CI/CD pipelines"], cat: "concept", short: "Continuous Integration / Continuous Delivery", long: "An automated software development practice where code changes are frequently merged (CI) and automatically built, tested, and prepared for release (CD). The pipeline is the series of automated steps — build, test, scan, deploy — that code passes through from commit to production." },
  { id: "sast", term: "SAST", cat: "concept", short: "Static Application Security Testing", long: "Analyzes source code, bytecode, or binaries for security vulnerabilities without executing the program. Runs early in the pipeline (at build time) and catches issues like SQL injection patterns, hardcoded credentials, and insecure crypto. Think of it as a spell-checker for security bugs in your code." },
  { id: "sca", term: "SCA", cat: "concept", short: "Software Composition Analysis", long: "Scans your third-party libraries and open-source dependencies for known vulnerabilities (CVEs) and license compliance issues. Since modern applications are 70-90% open-source code, SCA is essential to catch vulnerabilities you didn't write but still ship." },
  { id: "dast", term: "DAST", cat: "concept", short: "Dynamic Application Security Testing", long: "Tests a running application from the outside by sending crafted HTTP requests and analyzing responses for vulnerabilities. Unlike SAST, DAST doesn't need source code — it attacks the live application in staging or QA, finding runtime issues like authentication bypasses, injection flaws, and misconfigurations." },
  { id: "iast", term: "IAST", cat: "concept", short: "Interactive Application Security Testing", long: "Combines elements of SAST and DAST by instrumenting the running application with an agent. The agent monitors code execution in real time during testing, providing precise vulnerability location with very low false positives." },
  { id: "sbom", term: "SBOM", cat: "concept", short: "Software Bill of Materials", long: "A complete, formally structured inventory of all components, libraries, and dependencies in a piece of software — like a nutrition label for code. Formats include CycloneDX and SPDX. Critical for supply chain security: if a vulnerability is found in a library (like Log4Shell), an SBOM lets you instantly check if you're affected." },
  { id: "iac", term: "IaC", aliases: ["Infrastructure as Code"], cat: "concept", short: "Infrastructure as Code", long: "Managing and provisioning infrastructure (servers, networks, databases) through machine-readable definition files rather than manual configuration. Tools like Terraform and CloudFormation let you version-control your infrastructure, review changes via pull requests, and reproduce environments exactly." },
  { id: "rbac", term: "RBAC", cat: "concept", short: "Role-Based Access Control", long: "A method of restricting system access based on roles assigned to users. Instead of giving individual permissions, users are assigned roles (admin, developer, viewer) that carry predefined permission sets. In Kubernetes, RBAC controls who can create, modify, or delete resources." },
  { id: "devsecops", term: "DevSecOps", cat: "concept", short: "Development + Security + Operations", long: "A culture and practice of integrating security into every phase of the software development lifecycle, rather than treating it as a final checkpoint. The goal is to make security everyone's responsibility, automate security testing in the CI/CD pipeline, and catch vulnerabilities as early as possible ('shift left')." },
  { id: "devops", term: "DevOps", cat: "concept", short: "Development + Operations", long: "A set of practices that combines software development (Dev) and IT operations (Ops) to shorten the development lifecycle and deliver software continuously. DevSecOps extends this by adding security as a first-class concern." },
  { id: "sdlc", term: "SDLC", cat: "concept", short: "Software Development Life Cycle", long: "The complete process of planning, creating, testing, deploying, and maintaining software. Phases: requirements, design, implementation, testing, deployment, maintenance. DevSecOps embeds security into every phase." },
  { id: "opa", term: "OPA", aliases: ["Open Policy Agent","OPA/Gatekeeper"], cat: "concept", short: "Open Policy Agent", long: "A general-purpose policy engine for unified, context-aware policy enforcement. In Kubernetes, OPA runs as an admission controller (via Gatekeeper) that evaluates every resource against policies written in Rego language. Example: block privileged containers, enforce resource limits, require specific labels." },
  { id: "siem", term: "SIEM", cat: "concept", short: "Security Information and Event Management", long: "A system that aggregates and analyzes security log data from across your infrastructure in real time. SIEMs (Splunk, Elastic SIEM, Microsoft Sentinel) correlate events from multiple sources to detect threats, generate alerts, and support incident investigation." },
  { id: "soar", term: "SOAR", cat: "concept", short: "Security Orchestration, Automation and Response", long: "Platforms that automate incident response workflows. When a SIEM detects a threat, SOAR can automatically execute a playbook — isolating a compromised container, blocking an IP, creating a ticket — without manual intervention." },
  { id: "cve", term: "CVE", aliases: ["CVEs"], cat: "concept", short: "Common Vulnerabilities and Exposures", long: "A standardized identifier for publicly known security vulnerabilities (e.g., CVE-2021-44228 is Log4Shell). Each CVE gets a severity score (CVSS). SCA tools check your dependencies against CVE databases to find known vulnerabilities." },
  { id: "mttr", term: "MTTR", cat: "concept", short: "Mean Time to Remediate", long: "The average time between discovering a vulnerability and deploying a fix to production. A key DevSecOps KPI. Typically tracked by severity: critical vulns might target 24-hour MTTR, medium vulns 30 days." },
  { id: "cis-benchmarks", term: "CIS Benchmarks", cat: "concept", short: "Center for Internet Security configuration standards", long: "Consensus-based, best-practice security configuration guides for operating systems, cloud providers, databases, and applications. They define specific hardening settings (disable root SSH, enforce password complexity) as a baseline." },
  { id: "policy-as-code", term: "Policy-as-Code", cat: "concept", short: "Security/compliance policies defined as executable code", long: "Writing security and compliance rules as code (Rego for OPA, YAML for Kyverno) that can be version-controlled, tested, and automatically enforced in CI/CD pipelines. Replaces manual policy checks with automated, consistent enforcement." },
  { id: "shift-left", term: "Shift Left", cat: "concept", short: "Moving security testing earlier in development", long: "Catching vulnerabilities as early as possible — at the developer workstation or during code review, not in staging or production. Pre-commit hooks, IDE plugins, and SAST in pull requests are shift-left practices." },
  { id: "quality-gate", term: "Quality Gate", aliases: ["quality gate","quality gates"], cat: "concept", short: "Automated pass/fail checkpoint in a CI/CD pipeline", long: "A set of conditions code must meet before progressing. Security quality gates might require: zero critical SAST findings, no critical CVEs in dependencies, all container scans passed. If any condition fails, the pipeline stops." },
  { id: "golden-image", term: "Golden Image", aliases: ["golden images","golden base images"], cat: "concept", short: "Pre-approved, hardened base container/VM image", long: "A centrally maintained, security-hardened base image that all teams must use. Rebuilt regularly (typically weekly) with latest OS patches, unnecessary packages removed, CIS benchmarks applied. Ensures every container starts from a known-secure foundation." },
  { id: "microsegmentation", term: "Microsegmentation", cat: "concept", short: "Granular network isolation between services", long: "Dividing a network into very small, isolated segments so each service can only communicate with specific services it needs. In Kubernetes, implemented via Network Policies. If one service is compromised, lateral movement is blocked." },
  { id: "taint-analysis", term: "Taint Analysis", cat: "concept", short: "Tracking untrusted data flow through application code", long: "A SAST technique that traces user-controlled input ('tainted' data) through code to see if it reaches security-sensitive functions (SQL queries, system commands) without sanitization. Deep taint analysis follows data across functions and files." },
  { id: "admission-controller", term: "Admission Controller", aliases: ["Admission Controllers","admission controllers"], cat: "concept", short: "Kubernetes gatekeeper validating resources before creation", long: "Code that intercepts requests to the Kubernetes API server before resources are persisted. Can validate (reject non-compliant) or mutate (add defaults). OPA/Gatekeeper and Kyverno are popular policy-based admission controllers." },
  { id: "security-champion", term: "Security Champion", aliases: ["Security Champions","security champions"], cat: "concept", short: "Developer serving as team security point-person", long: "A development team member with extra security training who bridges security and development teams. Reviews security-sensitive changes, advocates secure coding, escalates concerns. Remains a developer first — not a full-time security role." },
  { id: "threat-modelling", term: "Threat Modelling", aliases: ["Threat Modeling"], cat: "concept", short: "Systematic identification of potential threats", long: "A structured design-phase process for identifying what can go wrong. Methods include STRIDE (Spoofing, Tampering, Repudiation, Information Disclosure, DoS, Elevation of Privilege). Output: prioritized threats with recommended mitigations." },
  { id: "slsa", term: "SLSA", cat: "concept", short: "Supply-chain Levels for Software Artifacts", long: "A security framework (pronounced 'salsa') defining levels of build integrity and provenance. Addresses supply chain attacks by requiring reproducible builds, recorded provenance, and hardened build platforms. Levels L0 through L3." },
  { id: "supply-chain-security", term: "Supply Chain Security", cat: "concept", short: "Protecting the software delivery pipeline integrity", long: "Ensuring every component — source code, dependencies, build tools, deployment infrastructure — is trustworthy and untampered. Attacks like SolarWinds and Log4Shell highlighted the need for SBOM generation, artifact signing, and build provenance." },
  { id: "pre-commit-hook", term: "Pre-commit Hook", aliases: ["Pre-commit hooks","pre-commit hooks"], cat: "concept", short: "Script running automatically before a git commit", long: "A git hook executing checks before code is committed. Security uses: scanning for hardcoded secrets (Gitleaks), running security linters, checking for large binaries. If problems are found, the commit is blocked." },
  { id: "branch-protection", term: "Branch Protection", cat: "concept", short: "Rules restricting how code merges to important branches", long: "Git platform settings preventing direct pushes to critical branches (main/master), requiring PR reviews and CI checks to pass. Ensures all changes go through review and automated testing." },
  { id: "codeowners", term: "CODEOWNERS", cat: "concept", short: "File defining required reviewers for code paths", long: "A repository file mapping file paths to required reviewers. Security use: require security team approval for changes to authentication modules, crypto code, CI/CD configs, and Dockerfiles." },
  { id: "gpg-signing", term: "GPG Signing", aliases: ["GPG-signed commits","Signed commits"], cat: "concept", short: "Cryptographically signing git commits for authorship proof", long: "Using GPG keys to digitally sign commits, proving the commit was made by the claimed author and hasn't been tampered with. Without signing, anyone with repo access could forge commits under another's name." },
  { id: "container-drift", term: "Container Drift Detection", aliases: ["Container drift detection","drift detection"], cat: "concept", short: "Detecting unauthorized changes to running containers", long: "Monitoring running containers for modifications not in the original image — new binaries, changed configs, unexpected processes. Drift indicates compromise or undocumented manual changes, both violating immutable infrastructure principles." },
  { id: "false-positive", term: "False Positive", aliases: ["False positives","false positives"], cat: "concept", short: "Scanner incorrectly flagging safe code as vulnerable", long: "When a tool reports a vulnerability that doesn't exist. High false positive rates cause 'alert fatigue' — developers ignore findings. Good practice includes tool tuning and triage processes." },
  { id: "vuln-escape-rate", term: "Vulnerability Escape Rate", cat: "concept", short: "% of vulnerabilities reaching production uncaught", long: "Key metric measuring pipeline gate effectiveness. If 100 vulns exist and 15 reach prod, escape rate is 15%. Lower is better — your pipeline catches more before deployment." },
  { id: "rego", term: "Rego", cat: "concept", short: "Policy language used by OPA", long: "A declarative query language for writing policies. Example: 'deny any pod requesting privileged mode' or 'require all containers to have resource limits.' Used with OPA/Gatekeeper for Kubernetes admission control." },
  { id: "network-policies", term: "Network Policies", aliases: ["Network policies","network policies"], cat: "concept", short: "Kubernetes rules controlling pod-to-pod traffic", long: "Kubernetes resources defining which pods can communicate. By default all pods can talk to all others. Network policies restrict this — e.g., only frontend talks to API, only API talks to database." },
  { id: "gitflow", term: "GitFlow", cat: "concept", short: "Branching model with develop, feature, release, hotfix branches", long: "A structured branching strategy with dedicated branches: develop for ongoing work, feature/* for new features, release/* for preparation, hotfix/* for urgent fixes. More complex than trunk-based but provides clear release management." },
  { id: "trunk-based", term: "Trunk-based Development", aliases: ["trunk-based"], cat: "concept", short: "All developers commit to a single main branch frequently", long: "A strategy where all developers commit to trunk (main) frequently using short-lived branches (hours to days). Requires strong CI/CD and automated testing. Considered best practice for high-performing teams." },
  { id: "feature-branches", term: "Feature Branches", aliases: ["feature branches"], cat: "concept", short: "Isolated branches for individual features", long: "Creating a separate branch per feature, developing in isolation, then merging via pull request. Keeps main stable and allows code review. Risk: long-lived branches that diverge significantly." },
  { id: "jenkins", term: "Jenkins", cat: "tool-cicd", short: "Open-source CI/CD automation server", long: "The most widely adopted open-source CI/CD server. 1800+ plugins. Pipelines in Jenkinsfiles (Groovy). Self-hosted — you manage infrastructure. Very flexible but requires significant maintenance and security hardening." },
  { id: "gitlab-ci", term: "GitLab CI", cat: "tool-cicd", short: "CI/CD built into GitLab", long: "GitLab's integrated CI/CD. Pipelines in .gitlab-ci.yml. Runs on GitLab Runners (self-hosted or shared). Tightly integrated with GitLab's code review, issue tracking, and container registry." },
  { id: "github-actions", term: "GitHub Actions", cat: "tool-cicd", short: "CI/CD automation built into GitHub", long: "GitHub's native CI/CD. Workflows in YAML under .github/workflows/. Huge marketplace of community actions. Tight integration with PRs, code scanning, and Dependabot." },
  { id: "azure-devops", term: "Azure DevOps", cat: "tool-cicd", short: "Microsoft's DevOps platform", long: "Microsoft's suite: Azure Pipelines (CI/CD), Repos (git), Boards (PM), Artifacts (packages). Supports YAML and classic UI pipelines. Strong Azure cloud integration." },
  { id: "bamboo", term: "Bamboo", cat: "tool-cicd", short: "Atlassian's CI/CD server", long: "Atlassian's CI/CD product, integrated with Jira and Bitbucket. Web UI-based (not YAML). Self-hosted only. Being gradually sunset in favor of Bitbucket Pipelines." },
  { id: "circleci", term: "CircleCI", cat: "tool-cicd", short: "Cloud-native CI/CD platform", long: "Popular cloud-based CI/CD known for fast builds and Docker-first approach. YAML config (.circleci/config.yml). Supports orbs — reusable configuration packages." },
  { id: "teamcity", term: "TeamCity", cat: "tool-cicd", short: "JetBrains' CI/CD server", long: "JetBrains' build management and CI server. Configuration via Kotlin DSL or web UI. Strong JetBrains IDE integration. Self-hosted with free tier." },
  { id: "semgrep", term: "Semgrep", aliases: ["Semgrep IDE"], cat: "tool-sast", short: "Fast, open-source static analysis with custom rules", long: "Lightweight SAST supporting 30+ languages. Rules in simple pattern-matching syntax. Huge community library covering OWASP Top 10. Runs in seconds — ideal for CI/CD and IDE." },
  { id: "sonarqube", term: "SonarQube", aliases: ["SonarLint"], cat: "tool-sast", short: "Code quality and security analysis platform", long: "Widely adopted for continuous quality and security inspection. SonarLint is the IDE plugin. Supports quality gates that block pipelines. Community (free) and commercial editions." },
  { id: "checkmarx", term: "Checkmarx", cat: "tool-sast", short: "Enterprise SAST with deep taint analysis", long: "Enterprise-grade SAST known for deep data-flow and taint analysis — traces user input through complex code paths across files. 25+ languages. More thorough but slower than Semgrep." },
  { id: "fortify", term: "Fortify", cat: "tool-sast", short: "OpenText enterprise SAST solution", long: "One of the oldest enterprise SAST tools. Static analysis, DAST (WebInspect), and centralized management. Widely used in government and large enterprises. Broad language support, slower scans." },
  { id: "codeql", term: "CodeQL", cat: "tool-sast", short: "GitHub's semantic code analysis engine", long: "Treats code as data — you write SQL-like queries (QL) to find vulnerability patterns. Integrated into GitHub Advanced Security. Powerful for complex vulnerabilities that pattern-matching tools miss." },
  { id: "snyk", term: "Snyk", aliases: ["Snyk IDE"], cat: "tool-sca", short: "Developer-first security platform", long: "Popular developer-friendly platform scanning dependencies, containers, IaC, and code. Known for automatic fix PRs. IDE, CI/CD, and git integration. Freemium model." },
  { id: "dependabot", term: "Dependabot", cat: "tool-sca", short: "GitHub's automated dependency updater", long: "GitHub's built-in tool creating PRs to update outdated or vulnerable dependencies. Monitors dependency files (package.json, requirements.txt, etc.). Free for all GitHub repos." },
  { id: "owasp-dep-check", term: "OWASP Dependency-Check", aliases: ["Dependency-Check"], cat: "tool-sca", short: "Open-source SCA checking against NVD", long: "Free OWASP SCA tool identifying known vulnerabilities by checking against the National Vulnerability Database. Supports Java, .NET, Python, Ruby, Node.js. Can generate CycloneDX SBOMs." },
  { id: "black-duck", term: "Black Duck", cat: "tool-sca", short: "Synopsys enterprise SCA", long: "Enterprise SCA providing vulnerability detection, license compliance, and operational risk assessment. Large proprietary knowledge base. Often used in M&A due diligence." },
  { id: "mend", term: "Mend", cat: "tool-sca", short: "Enterprise SCA (formerly WhiteSource)", long: "Enterprise SCA focused on open-source security and license compliance. Automated policy enforcement, prioritized remediation guidance. Rebranded from WhiteSource in 2022." },
  { id: "trivy", term: "Trivy", cat: "tool-container", short: "Fast, comprehensive open-source vulnerability scanner", long: "Aqua Security's open-source scanner — de facto standard for container image scanning. Covers OS packages, app dependencies, IaC misconfigs, secrets, and licenses in one tool. Extremely fast. Also scans filesystems, git repos, and Kubernetes." },
  { id: "grype", term: "Grype", cat: "tool-container", short: "Open-source vulnerability scanner from Anchore", long: "Anchore's scanner for container images and filesystems. Pairs with Syft (SBOM generator). Supports CycloneDX output. Lighter than Trivy but focused on vulnerability scanning." },
  { id: "prisma-cloud", term: "Prisma Cloud", aliases: ["Prisma Cloud (Twistlock)"], cat: "tool-container", short: "Palo Alto's cloud-native security platform", long: "Comprehensive cloud security: container scanning, runtime protection, compliance monitoring, CSPM, and microsegmentation. Enterprise product with broad coverage. Acquired from Twistlock." },
  { id: "aqua", term: "Aqua", aliases: ["Aqua Security","Aqua Runtime Protection","Aqua Runtime"], cat: "tool-container", short: "Full lifecycle container security", long: "End-to-end container security: image scanning, runtime protection, network firewall, compliance enforcement. Also maintains Trivy (open-source) and Tracee (eBPF-based runtime security)." },
  { id: "sysdig", term: "Sysdig", aliases: ["Sysdig Secure"], cat: "tool-container", short: "Container security and monitoring platform", long: "Built on Falco (which Sysdig created). Image scanning, runtime threat detection, compliance, forensics. Deep system visibility via kernel instrumentation. Combines security and performance monitoring." },
  { id: "gitleaks", term: "Gitleaks", cat: "tool-secrets", short: "Open-source secrets detector for git repos", long: "Fast tool designed to find hardcoded secrets (API keys, passwords, tokens) in git repos. Scans entire git history — important because secrets in deleted commits are still accessible. Uses regex and entropy analysis." },
  { id: "trufflehog", term: "TruffleHog", cat: "tool-secrets", short: "Secrets scanner using entropy + pattern matching", long: "Uses high-entropy string detection and 700+ regex patterns. Can verify detected credentials against live services to confirm validity, significantly reducing false positives." },
  { id: "gitguardian", term: "GitGuardian", cat: "tool-secrets", short: "Real-time secrets detection platform", long: "Monitors git repos in real time for exposed credentials. Scans public GitHub for your org's leaked secrets. Dashboards, alerting, remediation workflows. Popular for org-wide monitoring." },
  { id: "detect-secrets", term: "detect-secrets", cat: "tool-secrets", short: "Yelp's open-source pre-commit secrets detector", long: "Developed by Yelp for pre-commit detection. Maintains a baseline of known secrets and alerts on new ones. Plugin architecture with entropy, keyword, and regex detection methods." },
  { id: "owasp-zap", term: "OWASP ZAP", aliases: ["ZAP"], cat: "tool-dast", short: "Open-source web security scanner", long: "World's most popular free web security scanner from OWASP. Acts as a proxy intercepting traffic. Automated scanning (spider + active scan), API scanning, CI/CD integration via Docker. Excellent for pipeline baseline scanning." },
  { id: "burp-enterprise", term: "Burp Suite Enterprise", aliases: ["Burp Enterprise"], cat: "tool-dast", short: "PortSwigger's enterprise DAST", long: "Enterprise Burp Suite for automated, scheduled scanning at scale. Built for CI/CD integration (unlike Burp Professional for manual testing). Dashboards, trending, compliance reporting." },
  { id: "nuclei", term: "Nuclei", cat: "tool-dast", short: "Fast, template-based vulnerability scanner", long: "ProjectDiscovery's scanner using YAML templates for vulnerability checks. 7000+ community templates covering CVEs, misconfigs, and exposures. Very fast for large-scale scanning." },
  { id: "invicti", term: "Invicti", cat: "tool-dast", short: "Enterprise DAST with proof-of-exploit", long: "Enterprise DAST (formerly Netsparker) known for proof-based scanning — provides safe proof of exploit for confirmed findings, dramatically reducing false positives." },
  { id: "checkov", term: "Checkov", cat: "tool-iac", short: "Open-source IaC scanner, 1000+ policies", long: "Bridgecrew's tool checking Terraform, CloudFormation, Kubernetes, Helm, Dockerfile, ARM for misconfigurations. 1000+ built-in policies. Supports custom policies in Python or YAML." },
  { id: "tfsec", term: "tfsec", cat: "tool-iac", short: "Terraform-specific security scanner", long: "Fast, focused scanner for Terraform code. Checks for public S3 buckets, open security groups, unencrypted databases, overly permissive IAM. Now integrated into Trivy but still standalone." },
  { id: "kics", term: "KICS", cat: "tool-iac", short: "Checkmarx's open-source IaC scanner", long: "Keeping Infrastructure as Code Secure. Supports Terraform, CloudFormation, Ansible, Docker, Kubernetes. Uses Rego-based queries (same as OPA)." },
  { id: "terrascan", term: "Terrascan", cat: "tool-iac", short: "IaC scanner with OPA Rego support", long: "Tenable's tool scanning Terraform, Kubernetes, Helm, Dockerfiles, CloudFormation. Uses OPA Rego for policies, allowing reuse between Terrascan and OPA/Gatekeeper. 500+ built-in policies." },
  { id: "falco", term: "Falco", cat: "tool-runtime", short: "Open-source runtime security for containers/K8s", long: "CNCF project (created by Sysdig) monitoring system calls at kernel level to detect anomalous behavior — unexpected network connections, sensitive file access, privilege escalation, container escape attempts. YAML-based rules." },
  { id: "apparmor", term: "AppArmor", cat: "tool-runtime", short: "Linux mandatory access control module", long: "Linux Security Module restricting program capabilities using per-program profiles. Defines which files, network operations, and capabilities a process can use. Simpler than SELinux. Used in K8s to restrict containers." },
  { id: "seccomp", term: "Seccomp", aliases: ["Seccomp profiles"], cat: "tool-runtime", short: "Linux kernel syscall restriction", long: "Secure Computing Mode — filters which system calls a process can make. Default Docker profile blocks ~44 of 300+ syscalls. Custom profiles restrict further based on actual application needs." },
  { id: "kyverno", term: "Kyverno", cat: "tool-runtime", short: "Kubernetes-native policy engine (YAML-based)", long: "Policies in YAML (not Rego like OPA). Supports validate, mutate, generate, and verify images (Cosign signatures). Simpler learning curve than OPA/Gatekeeper for K8s administrators." },
  { id: "kubewarden", term: "Kubewarden", cat: "tool-runtime", short: "K8s policy engine using WebAssembly", long: "Runs policies compiled to WebAssembly — write in Rust, Go, C, or any Wasm-compatible language instead of a specific policy language. Policies distributed as OCI artifacts like container images." },
  { id: "cosign", term: "Cosign", aliases: ["Cosign/Sigstore"], cat: "tool-supply", short: "Container image signing tool (Sigstore project)", long: "Signs, verifies, and stores container image signatures. Supports keyless signing using OIDC identity (GitHub/Google identity as signing key). K8s admission controllers can verify signatures before allowing deployments." },
  { id: "sigstore", term: "Sigstore", cat: "tool-supply", short: "Open-source software signing infrastructure", long: "Linux Foundation project providing free signing infrastructure: Cosign (container signing), Fulcio (CA), Rekor (transparency log), Gitsign (git commit signing). Makes signing as easy as HTTPS." },
  { id: "syft", term: "Syft", cat: "tool-supply", short: "SBOM generator for container images", long: "Anchore's tool generating SBOMs from container images, filesystems, and archives. Outputs CycloneDX and SPDX. Pairs with Grype: Syft generates SBOM, Grype scans for vulnerabilities." },

// === Helpers ===

function T({ id, children }) {
  const entry = GLOSSARY.find(g => g.id === id);
  if (!entry) return <span>{children || id}</span>;
  return <a href={"#g-" + id} className="term-link" title={entry.term + ": " + entry.short}>{children || entry.term}</a>;
}

function Chip({ children, color = "amber" }) {
  return <span className={"chip chip-" + color}>{children}</span>;
}

function Card({ children, accent, danger }) {
  return <div className={"card" + (accent ? " accent" : "") + (danger ? " danger" : "")}>{children}</div>;
}

function Collapsible({ title, children, defaultOpen, tag, tagColor }) {
  const [open, setOpen] = useState(defaultOpen || false);
  return (
    <div className="collapsible">
      <button type="button" className="collapsible-head" onClick={() => setOpen(!open)}>
        <span className="collapsible-head-text">
          <span className={"collapsible-arrow" + (open ? " open" : "")}>▶</span>
          <span className="title">{title}</span>
          {tag && <Chip color={tagColor}>{tag}</Chip>}
        </span>
      </button>
      {open && <div className="collapsible-body">{children}</div>}
    </div>
  );
}

function BulletList({ items }) {
  return <ul className="bullet-list">{items.map((item, i) => <li key={i}>{item}</li>)}</ul>;
}

function NumberedList({ items }) {
  return <ol className="numbered-list">{items.map((item, i) => <li key={i}>{item}</li>)}</ol>;
}

function CompareTable({ headers, rows }) {
  return (
    <div className="compare-table-wrap">
      <table className="compare-table">
        <thead><tr>{headers.map((h, i) => <th key={i}>{h}</th>)}</tr></thead>
        <tbody>{rows.map((row, ri) => <tr key={ri}>{row.map((c, ci) => <td key={ci}>{c}</td>)}</tr>)}</tbody>
      </table>
    </div>
  );
}

const P = ({ children }) => <p className="prose">{children}</p>;

      <Collapsible title="DSOMM Maturity (0-4)" tag="Scoring" tagColor="blue">
        {[

        </P>
      </Card>
    </section>
  );
}

function GlossarySection() {
  const [search, setSearch] = useState("");
  const [catFilter, setCatFilter] = useState("all");

  const cats = useMemo(() => {
    const c = new Set(GLOSSARY.map(g => g.cat));
    return ["all", ...Array.from(c)];
  }, []);

  const filtered = useMemo(() => GLOSSARY.filter(g => {
    const mc = catFilter === "all" || g.cat === catFilter;
    const q = search.toLowerCase();
    const ms = !q
      || g.term.toLowerCase().includes(q)
      || g.short.toLowerCase().includes(q)
      || g.long.toLowerCase().includes(q)
      || (g.aliases && g.aliases.some(a => a.toLowerCase().includes(q)));
    return mc && ms;
  }), [search, catFilter]);

  const grouped = useMemo(() => {
    const gr = {};
    filtered.forEach(g => {
      if (!gr[g.cat]) gr[g.cat] = [];
      gr[g.cat].push(g);
    });
    return gr;
  }, [filtered]);

  return (
    <section className="section" id="glossary">
      <h2 className="section-title">Reference Guide</h2>
      <P>Every term, tool, and technology explained. Tap any <span className="term-link" style={{cursor: 'default'}}>highlighted term</span> anywhere in the playbook to jump to its entry below.</P>

      <div className="glossary-search">
        <input
          type="text"
          placeholder="Search terms, tools, concepts…"
          value={search}
          onChange={e => setSearch(e.target.value)}
          autoComplete="off"
          autoCapitalize="off"
          autoCorrect="off"
          spellCheck="false"
        />
        <div className="glossary-filters">
          {cats.map(c => {
            const label = c === "all" ? "All" : (CAT_LABELS[c] || c);
            const count = c === "all" ? GLOSSARY.length : GLOSSARY.filter(g => g.cat === c).length;
            const cls = "glossary-filter-btn cat-" + c + (catFilter === c ? " active" : "");
            return (
              <button key={c} type="button" className={cls} onClick={() => setCatFilter(c)}>
                {label} ({count})
              </button>
            );
          })}
        </div>
      </div>

      <div className="glossary-count">{filtered.length} of {GLOSSARY.length} entries</div>

      {Object.entries(grouped).map(([cat, entries]) => (
        <div key={cat} className="glossary-group">
          <div className="glossary-group-head">
            <span className={"chip cat-" + cat}>{CAT_LABELS[cat] || cat}</span>
          </div>
          {entries.map(entry => (
            <div key={entry.id} id={"g-" + entry.id} className="glossary-entry">
              <div className="glossary-entry-head">
                <span className="glossary-entry-term">{entry.term}</span>
                <span className="glossary-entry-short">{entry.short}</span>
              </div>
              <div className="glossary-entry-long">{entry.long}</div>
              {entry.aliases && entry.aliases.length > 0 && (
                <div className="glossary-entry-aliases">
                  <span className="label">Also:</span>
                  {entry.aliases.map(a => <span key={a} className="alias">{a}</span>)}
                </div>
              )}
            </div>
          ))}
        </div>
      ))}

      {filtered.length === 0 && (
        <div className="glossary-empty">
          <p className="lg">No matches</p>
          <p>Try a different search, or clear filters</p>
        </div>
      )}
    </section>
  );
}

// === App ===

function App() {
  const [activeSec, setActiveSec] = useState("intel");

  useEffect(() => {
    const observer = new IntersectionObserver(
      entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) setActiveSec(entry.target.id);
        });
      },
      { rootMargin: "-120px 0px -60% 0px" }
    );
    SECTIONS.forEach(s => {
      const el = document.getElementById(s.id);
      if (el) observer.observe(el);
    });
    return () => observer.disconnect();
  }, []);

  return (
    <div className="app">
      <div className="hero">
        <div className="hero-brand">
          <div className="hero-icon">🛡️</div>
          <div>
            <h1>DevSecOps Advisory Playbook</h1>
            <div className="hero-tag">DSOVS &amp; DSOMM · 35 man-days · 7 weeks</div>
          </div>
        </div>
      </div>

      <nav className="section-nav" id="topnav">
        <div className="section-nav-inner">
          {SECTIONS.map(s => (
            <a
              key={s.id}
              href={"#" + s.id}
              className={activeSec === s.id ? "active" : ""}
            >
              <span className="nav-emoji">{s.emoji}</span>
              <span>{s.label}</span>
            </a>
          ))}
        </div>
      </nav>

      <PreMeetingIntel />
      <EvaluateApproach />
      <FrameworkDeepDive />
      <SecurePipeline />
      <KickoffStrategy />
      <OversightPlaybook />
      <GlossarySection />
    </div>
  );
}

root.render(<App />);
