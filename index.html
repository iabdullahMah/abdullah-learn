<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="learn" />
  <!-- One theme-color meta; content is kept in sync with effective theme
       by the boot script below. Static fallback is dark. -->
  <meta name="theme-color" id="theme-color-meta" content="#0a0a0c" />
  <meta name="description" content="abdullah-learn — an offensive security notebook by Ag." />

  <!-- Apply stored/system theme before first paint to avoid FOUC.
       Also tags <html> with theme-light/theme-dark classes as a paint
       kicker for iOS Safari — flipping only the attribute sometimes
       left stale body pixels on a theme toggle. -->
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('theme'); // 'dark' | 'light' | null
        var sysLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
        var effective = stored || (sysLight ? 'light' : 'dark');
        var bg = effective === 'light' ? '#f7f5ef' : '#0a0a0c';
        var root = document.documentElement;
        if (stored === 'dark' || stored === 'light') {
          root.setAttribute('data-theme', stored);
        }
        root.classList.remove(effective === 'light' ? 'theme-dark'  : 'theme-light');
        root.classList.add(   effective === 'light' ? 'theme-light' : 'theme-dark');
        root.style.backgroundColor = bg;
        var meta = document.getElementById('theme-color-meta');
        if (meta) meta.setAttribute('content', bg);
      } catch (e) { /* localStorage can throw in private mode; ignore */ }
    })();
  </script>

  <title>abdullah-learn</title>

  <link rel="apple-touch-icon" href="/assets/icon-180.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/assets/icon-192.png" />
  <link rel="icon" type="image/svg+xml" href="/assets/icon.svg" />
  <link rel="manifest" href="/manifest.webmanifest" />

  <link rel="stylesheet" href="/assets/shared.css?v=3" />

  <style>
    /* ------------------------------------------------------------------ */
    /* index-specific styles. Mobile-first; desktop enhancements via MQ.  */
    /* ------------------------------------------------------------------ */

    .header {
      position: sticky;
      top: 0;
      z-index: 50;
      /* color-mix pulls from var(--bg) so the header can't desync from
         the body when the theme flips. Fallback: a flat var(--bg) for
         the rare iOS Safari build without color-mix (< 16.4). */
      background: var(--bg);
      background: color-mix(in srgb, var(--bg) 88%, transparent);
      -webkit-backdrop-filter: saturate(140%) blur(10px);
      backdrop-filter: saturate(140%) blur(10px);
      border-bottom: 1px solid var(--border);
      padding-top: env(safe-area-inset-top);
      transition: padding 160ms ease, background 160ms ease;
    }
    /* When scrolled past the hero, shrink the header so the chips
       always sit close to the thumb on mobile. */
    .header--compact {
      background: var(--bg);
      background: color-mix(in srgb, var(--bg) 94%, transparent);
    }
    .header--compact .header-inner { padding: 4px 0; }
    .header--compact .brand { font-size: 18px; }
    .header--compact .header-meta { display: none; }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: var(--tap);
      padding: 8px 0;
      gap: 12px;
      transition: padding 160ms ease;
    }
    .header-right {
      display: inline-flex;
      align-items: center;
      gap: 12px;
    }

    /* --- theme toggle button ---
       Pill with icon + current-mode label. Sitting on a cream header in
       light mode, an icon-only outline read as decoration — the word
       makes it obviously tappable. */
    .theme-toggle {
      height: var(--tap);
      min-height: var(--tap);
      padding: 0 14px 0 12px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-card);
      border: 1px solid var(--border-strong);
      border-radius: 999px;
      color: var(--fg);
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.04em;
    }
    .theme-toggle:active { background: var(--bg-card-hover); }
    .theme-toggle svg { width: 16px; height: 16px; display: block; }
    .theme-toggle .label-light,
    .theme-toggle .label-dark  { display: none; }
    /* Sun/moon + label swap driven by the html.theme-light/theme-dark
       classes. Boot script and applyTheme keep these in sync. */
    .theme-toggle .icon-sun  { display: none; }
    .theme-toggle .icon-moon { display: block; }
    html.theme-light .theme-toggle .icon-sun  { display: block; }
    html.theme-light .theme-toggle .icon-moon { display: none; }
    html.theme-light .theme-toggle .label-light { display: inline; }
    html.theme-dark  .theme-toggle .label-dark  { display: inline; }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-height: var(--tap);
      color: var(--fg);
      font-family: var(--font-display);
      font-size: 22px;
      letter-spacing: 0.01em;
    }

    .brand .mark {
      position: relative;
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--fg);
    }
    .brand .mark::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 1px solid var(--fg);
      opacity: 0;
      animation: pulse 2.8s ease-out infinite;
    }
    @keyframes pulse {
      0%   { opacity: 0.6; transform: scale(0.6); }
      70%  { opacity: 0; transform: scale(1.6); }
      100% { opacity: 0; transform: scale(1.6); }
    }
    @media (prefers-reduced-motion: reduce) {
      .brand .mark::after { animation: none; }
    }

    .brand em {
      font-style: italic;
      color: var(--fg);
    }

    .header-meta {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--fg-subtle);
      text-transform: lowercase;
      letter-spacing: 0.04em;
    }

    /* --- hero ---
       Title + one-line byline. No lead paragraph (it was just the
       tagline repeated), no filler "3 explainers" stats. */
    .hero { padding: 18px 0 10px; }
    @media (min-width: 768px) { .hero { padding: 40px 0 18px; } }

    .hero h1 {
      font-family: var(--font-display);
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: -0.01em;
      margin: 0 0 10px;
      color: var(--fg);
      font-size: clamp(30px, 8.5vw, 72px);
    }
    .hero h1 em { font-style: italic; color: var(--fg); }

    .byline {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--fg-subtle);
      letter-spacing: 0.04em;
      margin: 0;
    }
    .byline em {
      font-family: var(--font-display);
      font-style: italic;
      color: var(--fg-muted);
      font-size: 13px;
      letter-spacing: 0;
    }

    /* --- search & chips --- */
    .controls {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 6px 0 18px;
    }

    .search {
      position: relative;
    }
    .search input {
      width: 100%;
      min-height: var(--tap);
      padding: 12px 42px 12px 14px;
      background: var(--bg-raised);
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: var(--font-body);
      /* ≥16px — prevents iOS auto-zoom on focus */
      font-size: 16px;
      line-height: 1.4;
      appearance: none;
      -webkit-appearance: none;
    }
    .search input::placeholder { color: var(--fg-subtle); }
    .search input:focus {
      outline: none;
      border-color: var(--border-strong);
      background: var(--bg-card);
    }
    .search .kbd-hint {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--fg-subtle);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 6px;
      pointer-events: none;
      background: var(--bg);
    }

    /* Mobile: chips are collapsed behind a <details> sheet (see
       .filter below). Desktop: the 9-chip row comes back — there's
       horizontal room for it and the taps are more precise. */
    .chips-wrap { position: relative; }
    .chips {
      display: none;
      flex-wrap: wrap;
      gap: 8px;
      padding: 2px 0 6px;
    }
    @media (min-width: 768px) {
      .chips { display: flex; }
    }

    /* --- filter sheet (mobile) ---
       Single tap target that opens a vertical list of categories.
       Built on <details>/<summary> so it works without JS. */
    .filter { position: relative; }
    @media (min-width: 768px) { .filter { display: none; } }
    .filter > summary {
      list-style: none;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-height: var(--tap);
      padding: 0 14px;
      background: var(--bg-card);
      border: 1px solid var(--border-strong);
      border-radius: 999px;
      color: var(--fg);
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.03em;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .filter > summary::-webkit-details-marker { display: none; }
    .filter > summary .caret {
      transition: transform 160ms ease;
      font-family: var(--font-body);
      font-size: 14px;
      opacity: 0.7;
    }
    .filter[open] > summary .caret { transform: rotate(180deg); }
    .filter .sel-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--sel-accent, var(--fg-subtle));
      filter: var(--accent-filter);
    }

    .filter-list {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      z-index: 40;
      background: var(--bg-card);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      padding: 6px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.28);
    }
    .filter-item {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: var(--tap);
      padding: 0 12px;
      background: transparent;
      border: 0;
      border-radius: var(--radius-sm);
      color: var(--fg-muted);
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.02em;
      text-align: left;
      cursor: pointer;
    }
    .filter-item:active { background: var(--bg-card-hover); }
    .filter-item[aria-pressed="true"] { color: var(--fg); background: var(--bg-card-hover); }
    .filter-item .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--item-accent, var(--fg-subtle));
      filter: var(--accent-filter);
      flex: 0 0 auto;
    }
    .filter-item .name { flex: 1; color: var(--fg); font-family: var(--font-body); font-size: 14px; }
    .filter-item .count { color: var(--fg-subtle); font-size: 11px; }
    .filter-item--clear { color: var(--fg-muted); font-family: var(--font-mono); font-size: 12px; justify-content: center; border-top: 1px solid var(--border); margin-top: 4px; }

    .chip {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      /* Slightly smaller min-height on mobile so 9 chips don't dominate
         the first viewport — still well above Apple's tappable size. */
      min-height: 38px;
      padding: 0 12px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--fg-muted);
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.02em;
      cursor: pointer;
      white-space: nowrap;
      transition: border-color 120ms ease, color 120ms ease, background 120ms ease;
    }
    .chip .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--chip-accent, var(--fg-subtle));
      flex: 0 0 auto;
      filter: var(--accent-filter);
    }
    .chip[aria-pressed="true"] {
      color: var(--fg);
      border-color: var(--border-strong);
      background: var(--bg-card);
    }
    .chip:active { background: var(--bg-card-hover); }

    @media (min-width: 768px) {
      .chip { min-height: var(--tap); padding: 0 14px; font-size: 12px; }
    }

    /* --- category sections --- */
    .section { padding: 24px 0 10px; }
    .section + .section { border-top: 1px solid var(--border); margin-top: 14px; }

    /* When a category has no entries and nothing is filtered, on mobile
       we collapse the whole section to a single quiet row. It keeps the
       "shape of the site" visible without eating half a screen. */
    @media (max-width: 767px) {
      .section--quiet { padding: 10px 0; }
      .section--quiet .section-head { margin: 0; gap: 10px; }
      .section--quiet .section-head h2 {
        font-family: var(--font-body);
        font-weight: 500;
        font-size: 15px;
        line-height: 1.2;
        padding-left: 12px;
      }
      .section--quiet .section-head h2::before {
        top: 3px; bottom: 3px; width: 2px;
      }
      .section--quiet .section-head .section-meta { font-size: 10px; }
      .section--quiet .section-blurb { display: none; }
      .section--quiet .placeholder { display: none; }
      .section--quiet + .section { margin-top: 10px; }
    }

    .section-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      margin: 0 0 14px;
    }
    .section-head h2 {
      margin: 0;
      font-family: var(--font-display);
      font-weight: 400;
      font-size: clamp(26px, 6vw, 36px);
      letter-spacing: -0.005em;
      line-height: 1.15;
      position: relative;
      padding-left: 14px;
    }
    .section-head h2::before {
      content: '';
      position: absolute;
      left: 0;
      top: 10px;
      bottom: 10px;
      width: 2px;
      background: var(--section-accent, var(--fg-subtle));
      border-radius: 2px;
      filter: var(--accent-filter);
    }
    .section-head .section-meta {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--fg-subtle);
      letter-spacing: 0.04em;
      white-space: nowrap;
    }
    .section-blurb {
      color: var(--fg-muted);
      font-size: 14px;
      max-width: 60ch;
      margin: 0 0 18px;
    }
    /* On mobile, blurbs only show when this category is the selected
       chip — otherwise they multiply visual weight without adding info. */
    @media (max-width: 767px) {
      .section:not(.section--selected) .section-blurb { display: none; }
    }

    /* Footer link to expand a capped section. Lives inside the section. */
    .see-all {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: var(--tap);
      margin-top: 14px;
      padding: 0 14px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--fg);
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.03em;
      cursor: pointer;
    }
    .see-all:active { background: var(--bg-card-hover); }
    .see-all .arrow {
      font-family: var(--font-body);
      transition: transform 160ms ease;
    }
    .see-all:hover .arrow { transform: translateX(2px); }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }
    @media (min-width: 768px) {
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; }
    }
    @media (min-width: 1100px) {
      .grid { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 18px; }
    }

    .card {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 160px;
      padding: 18px 18px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--fg);
      overflow: hidden;
      transition: background 140ms ease, border-color 140ms ease, transform 140ms ease;
    }
    .card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--card-accent, var(--fg-subtle));
      transform: translateX(-4px);
      transition: transform 160ms ease;
      filter: var(--accent-filter);
    }
    .card:active::before,
    .card:focus-visible::before,
    .card:hover::before { transform: translateX(0); }
    .card:active,
    .card:hover { background: var(--bg-card-hover); border-color: var(--border-strong); }

    .card h3 {
      margin: 0 0 8px;
      font-family: var(--font-display);
      font-weight: 400;
      font-size: 22px;
      line-height: 1.2;
      letter-spacing: -0.005em;
    }
    .card p {
      margin: 0 0 14px;
      color: var(--fg-muted);
      font-size: 14px;
      line-height: 1.5;
    }
    .card .card-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-top: auto;
    }
    .card .date {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--fg-subtle);
      letter-spacing: 0.03em;
    }
    .card .interactive-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 22px;
      padding: 0 8px;
      border: 1px solid var(--border-strong);
      border-radius: 999px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--fg);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .card .interactive-badge .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--card-accent, var(--fg-subtle));
      filter: var(--accent-filter);
    }

    .placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 120px;
      padding: 24px;
      border: 1px dashed var(--border-strong);
      border-radius: var(--radius);
      color: var(--fg-subtle);
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.04em;
      text-align: center;
    }

    .empty-search {
      padding: 32px 16px;
      text-align: center;
      color: var(--fg-muted);
      font-family: var(--font-mono);
      font-size: 13px;
    }

    /* One-line roll-up of every category with no entries yet. Replaces
       the stack of dashed "— awaiting first entry —" placeholders. */
    .empty-cats {
      margin: 22px 0 0;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--fg-subtle);
      font-family: var(--font-mono);
      font-size: 11px;
      line-height: 1.6;
      letter-spacing: 0.03em;
    }
    .empty-cats strong { color: var(--fg-muted); font-weight: 500; }
    .empty-cats .names { color: var(--fg-muted); }

    /* --- footer --- */
    .footer {
      margin-top: 40px;
      padding: 28px 0 48px;
      border-top: 1px solid var(--border);
      color: var(--fg-subtle);
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.04em;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: space-between;
    }
    .footer em { font-family: var(--font-display); font-style: italic; color: var(--fg-muted); }

    /* --- loading state --- */
    .boot {
      padding: 80px 20px;
      color: var(--fg-subtle);
      font-family: var(--font-mono);
      font-size: 12px;
      text-align: center;
    }
  </style>
</head>
<body>

  <div id="root">
    <div class="boot">loading notebook…</div>
  </div>

  <!-- React 18 + Babel Standalone (in-browser JSX transpile). No build step. -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-presets="react">
    const { useEffect, useMemo, useRef, useState } = React;

    function formatDate(iso) {
      if (!iso) return '';
      // Keep it ISO-ish so it looks technical. No locale drift.
      return iso;
    }

    // Read effective theme (manual > system) without touching React state —
    // the boot script in <head> has already applied data-theme.
    function effectiveTheme() {
      var attr = document.documentElement.getAttribute('data-theme');
      if (attr === 'dark' || attr === 'light') return attr;
      return window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches
        ? 'light' : 'dark';
    }

    function applyTheme(next) {
      // next: 'dark' | 'light'. Bulletproof version: persist, flip the
      // attribute, flip helper classes, AND paint body + html inline.
      // The inline styles force iOS Safari to repaint even when var(--bg)
      // alone wouldn't (overflow-x:clip + var-only bg was getting skipped
      // on some builds).
      try { localStorage.setItem('theme', next); } catch (e) {}
      var bg = next === 'light' ? '#f7f5ef' : '#0a0a0c';
      var root = document.documentElement;
      root.setAttribute('data-theme', next);
      root.classList.remove(next === 'light' ? 'theme-dark'  : 'theme-light');
      root.classList.add(   next === 'light' ? 'theme-light' : 'theme-dark');
      root.style.backgroundColor = bg;
      if (document.body) document.body.style.backgroundColor = bg;
      var meta = document.getElementById('theme-color-meta');
      if (meta) meta.setAttribute('content', bg);
    }

    function ThemeToggle() {
      // Don't trust a captured React state — always read the live DOM.
      // That way a stale closure can never make the toggle a no-op.
      const [, force] = useState(0);
      function flip(e) {
        e.preventDefault();
        e.stopPropagation();
        var cur = effectiveTheme();
        var next = cur === 'light' ? 'dark' : 'light';
        applyTheme(next);
        force((n) => n + 1);
      }
      const theme = effectiveTheme();
      return (
        <button
          type="button"
          className="theme-toggle"
          onClick={flip}
          aria-label={theme === 'light' ? 'switch to dark mode' : 'switch to light mode'}
          title={theme === 'light' ? 'switch to dark mode' : 'switch to light mode'}
        >
          {/* Both icons + labels live in the DOM; CSS picks the pair
              that matches the effective theme. */}
          <svg className="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="4" />
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" />
          </svg>
          <svg className="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
          <span className="label-light">light</span>
          <span className="label-dark">dark</span>
        </button>
      );
    }

    function Header({ updated }) {
      // Compact the header once the user has scrolled past the hero —
      // saves vertical real estate so chips and content stay near the
      // thumb on mobile.
      useEffect(() => {
        const el = document.querySelector('.header');
        if (!el) return;
        let raf = 0;
        function onScroll() {
          if (raf) return;
          raf = requestAnimationFrame(() => {
            raf = 0;
            el.classList.toggle('header--compact', window.scrollY > 160);
          });
        }
        window.addEventListener('scroll', onScroll, { passive: true });
        onScroll();
        return () => {
          window.removeEventListener('scroll', onScroll);
          if (raf) cancelAnimationFrame(raf);
        };
      }, []);

      return (
        <header className="header">
          <div className="container header-inner">
            <a className="brand" href="/" aria-label="abdullah-learn home">
              <span className="mark" aria-hidden="true"></span>
              <span>abdullah<em>-learn</em></span>
            </a>
            <div className="header-right">
              <span className="header-meta">
                {updated ? `updated ${updated}` : ''}
              </span>
              <ThemeToggle />
            </div>
          </div>
        </header>
      );
    }

    function Hero({ data }) {
      return (
        <section className="hero container">
          <h1>
            Notes from <em>the</em> attack<br/>surface.
          </h1>
          <p className="byline">
            <em>by Jarvis, for Ag</em>
            {data.updated ? ` · updated ${data.updated}` : ''}
          </p>
        </section>
      );
    }

    function Controls({ query, setQuery, selected, setSelected, categories, counts, searchRef }) {
      const selectedCat = selected ? categories.find((c) => c.id === selected) : null;
      const filterRef = useRef(null);

      // Close the mobile filter sheet on outside tap and after selection.
      useEffect(() => {
        function onDocTap(e) {
          const el = filterRef.current;
          if (!el || !el.open) return;
          if (!el.contains(e.target)) el.open = false;
        }
        document.addEventListener('click', onDocTap);
        return () => document.removeEventListener('click', onDocTap);
      }, []);

      function pick(id) {
        setSelected(selected === id ? null : id);
        if (filterRef.current) filterRef.current.open = false;
      }

      return (
        <section className="controls container" aria-label="filter and search">
          <div className="search">
            <input
              ref={searchRef}
              type="search"
              inputMode="search"
              autoComplete="off"
              autoCorrect="off"
              autoCapitalize="off"
              spellCheck="false"
              placeholder="search titles, tags, categories…"
              value={query}
              onChange={(e) => setQuery(e.target.value)}
              aria-label="search"
            />
            <span className="kbd-hint" aria-hidden="true">/</span>
          </div>

          {/* Mobile: single filter button with a dropdown sheet. */}
          <details
            className="filter"
            ref={filterRef}
            style={selectedCat ? { '--sel-accent': selectedCat.accent } : null}
          >
            <summary>
              {selectedCat ? (
                <React.Fragment>
                  <span className="sel-dot" aria-hidden="true"></span>
                  <span>{selectedCat.name}</span>
                </React.Fragment>
              ) : (
                <span>filter · all categories</span>
              )}
              <span className="caret" aria-hidden="true">▾</span>
            </summary>
            <div className="filter-list" role="menu">
              {categories.map((c) => {
                const pressed = selected === c.id;
                const count = counts[c.id] || 0;
                return (
                  <button
                    key={c.id}
                    type="button"
                    role="menuitemradio"
                    aria-pressed={pressed}
                    className="filter-item"
                    style={{ '--item-accent': c.accent }}
                    onClick={() => pick(c.id)}
                  >
                    <span className="dot" aria-hidden="true"></span>
                    <span className="name">{c.name}</span>
                    <span className="count">{count || '—'}</span>
                  </button>
                );
              })}
              {selected ? (
                <button
                  type="button"
                  className="filter-item filter-item--clear"
                  onClick={() => { setSelected(null); if (filterRef.current) filterRef.current.open = false; }}
                >
                  clear filter
                </button>
              ) : null}
            </div>
          </details>

          {/* Desktop: full chip row. Hidden under 768px by CSS. */}
          <div className="chips" role="tablist" aria-label="categories">
            {categories.map((c) => {
              const pressed = selected === c.id;
              return (
                <button
                  key={c.id}
                  className="chip"
                  role="tab"
                  aria-pressed={pressed}
                  style={{ '--chip-accent': c.accent }}
                  onClick={() => setSelected(pressed ? null : c.id)}
                >
                  <span className="dot" aria-hidden="true"></span>
                  <span>{c.name}</span>
                </button>
              );
            })}
          </div>
        </section>
      );
    }

    function Card({ page, category }) {
      return (
        <a
          className="card"
          href={`/pages/${page.slug}.html`}
          style={{ '--card-accent': category ? category.accent : 'var(--fg-subtle)' }}
        >
          <div>
            <h3>{page.title}</h3>
            {page.description ? <p>{page.description}</p> : null}
          </div>
          <div className="card-meta">
            <span className="date">{formatDate(page.date)}</span>
            {Array.isArray(page.tags)
              ? page.tags.slice(0, 3).map((t) => (
                  <span key={t} className="tag">#{t}</span>
                ))
              : null}
            {page.interactive ? (
              <span className="interactive-badge" title="interactive page">
                <span className="dot" aria-hidden="true"></span>
                interactive
              </span>
            ) : null}
          </div>
        </a>
      );
    }

    // On the overview (no chip selected, no search), cap each category
    // to this many cards. Selecting the chip expands to full list.
    const INDEX_CAP = 4;

    function CategorySection({ category, pages, isFiltered, isSelected, onExpand }) {
      const hasPages = pages.length > 0;
      const isQuiet = !hasPages && !isFiltered;
      const capped = !isSelected && pages.length > INDEX_CAP
        ? pages.slice(0, INDEX_CAP)
        : pages;
      const hiddenCount = pages.length - capped.length;

      const classes = ['section', 'container'];
      if (isSelected) classes.push('section--selected');
      if (isQuiet)   classes.push('section--quiet');

      return (
        <section
          className={classes.join(' ')}
          style={{ '--section-accent': category.accent }}
          id={`cat-${category.id}`}
        >
          <div className="section-head">
            <h2>{category.name}</h2>
            <span className="section-meta">
              {hasPages ? `${pages.length} ${pages.length === 1 ? 'entry' : 'entries'}` : 'empty'}
            </span>
          </div>
          {category.blurb ? <p className="section-blurb">{category.blurb}</p> : null}
          {hasPages ? (
            <React.Fragment>
              <div className="grid">
                {capped.map((p) => (
                  <Card key={p.slug} page={p} category={category} />
                ))}
              </div>
              {hiddenCount > 0 ? (
                <button
                  className="see-all"
                  onClick={() => onExpand(category.id)}
                  aria-label={`see all ${pages.length} entries in ${category.name}`}
                >
                  <span>see all {pages.length}</span>
                  <span className="arrow" aria-hidden="true">→</span>
                </button>
              ) : null}
            </React.Fragment>
          ) : !isFiltered ? (
            <div className="placeholder">— awaiting first entry —</div>
          ) : null}
        </section>
      );
    }

    function Footer({ owner }) {
      return (
        <footer className="footer container">
          <span>© {new Date().getFullYear()} {owner || 'Ag'} — a personal notebook</span>
          <span><em>built by Jarvis, read by Ag</em></span>
        </footer>
      );
    }

    function App() {
      const [data, setData] = useState(null);
      const [error, setError] = useState(null);
      const [query, setQuery] = useState('');
      const [selected, setSelected] = useState(null);
      const searchRef = useRef(null);

      useEffect(() => {
        let alive = true;
        fetch('/manifest.json', { cache: 'no-cache' })
          .then((r) => {
            if (!r.ok) throw new Error(`manifest http ${r.status}`);
            return r.json();
          })
          .then((j) => { if (alive) setData(j); })
          .catch((e) => { if (alive) setError(e.message || String(e)); });
        return () => { alive = false; };
      }, []);

      // Keyboard shortcuts — desktop only. On touch devices these events
      // essentially never fire, but we also guard with hover: none CSS.
      useEffect(() => {
        function onKey(e) {
          const tag = (e.target && e.target.tagName) || '';
          const typing = tag === 'INPUT' || tag === 'TEXTAREA';
          if (e.key === '/' && !typing) {
            e.preventDefault();
            if (searchRef.current) searchRef.current.focus();
          } else if (e.key === 'Escape') {
            if (typing) searchRef.current && searchRef.current.blur();
            setQuery('');
            setSelected(null);
          }
        }
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const categoryById = useMemo(() => {
        if (!data) return {};
        const m = {};
        data.categories.forEach((c) => { m[c.id] = c; });
        return m;
      }, [data]);

      const filteredPages = useMemo(() => {
        if (!data) return [];
        const q = query.trim().toLowerCase();
        return data.pages.filter((p) => {
          if (selected && p.category !== selected) return false;
          if (!q) return true;
          const hay = [
            p.title || '',
            p.description || '',
            p.category || '',
            (p.tags || []).join(' '),
          ].join(' ').toLowerCase();
          return hay.includes(q);
        });
      }, [data, query, selected]);

      if (error) {
        return (
          <main>
            <Header updated="" />
            <div className="container boot">
              couldn’t load manifest: <code>{error}</code>
            </div>
          </main>
        );
      }

      if (!data) {
        return (
          <main>
            <div className="boot">loading notebook…</div>
          </main>
        );
      }

      const isFiltered = Boolean(query.trim() || selected);

      // Group filtered pages by category, preserving category order.
      const pagesByCat = {};
      data.categories.forEach((c) => { pagesByCat[c.id] = []; });
      filteredPages.forEach((p) => {
        if (pagesByCat[p.category]) pagesByCat[p.category].push(p);
      });

      const visibleCats = selected
        ? data.categories.filter((c) => c.id === selected)
        : data.categories;

      // Counts use the full manifest (not the filtered set) so the
      // filter sheet shows total entries per category regardless of
      // current search.
      const catCounts = {};
      data.categories.forEach((c) => { catCounts[c.id] = 0; });
      data.pages.forEach((p) => {
        if (catCounts[p.category] !== undefined) catCounts[p.category] += 1;
      });

      // Split visible categories into ones with entries and ones
      // awaiting their first entry. Empty sections get rolled into a
      // single quiet line at the bottom instead of stacking dashed
      // placeholder boxes.
      const nonEmptyVisibleCats = visibleCats.filter(
        (c) => (pagesByCat[c.id] || []).length > 0
      );
      const emptyCats = selected
        ? []
        : data.categories.filter((c) => (catCounts[c.id] || 0) === 0);

      const nothingMatches = isFiltered && filteredPages.length === 0;

      return (
        <main>
          <Header updated={data.updated} />
          <Hero data={data} />
          <Controls
            query={query}
            setQuery={setQuery}
            selected={selected}
            setSelected={setSelected}
            categories={data.categories}
            counts={catCounts}
            searchRef={searchRef}
          />
          {nothingMatches ? (
            <div className="container empty-search">
              nothing matches “{query}”{selected ? ` in ${categoryById[selected].name}` : ''}.
            </div>
          ) : (
            <React.Fragment>
              {nonEmptyVisibleCats.map((c) => (
                <CategorySection
                  key={c.id}
                  category={c}
                  pages={pagesByCat[c.id] || []}
                  isFiltered={isFiltered}
                  isSelected={selected === c.id}
                  onExpand={(id) => {
                    setSelected(id);
                    requestAnimationFrame(() => {
                      const el = document.getElementById(`cat-${id}`);
                      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    });
                  }}
                />
              ))}
              {!isFiltered && emptyCats.length > 0 ? (
                <div className="container">
                  <div className="empty-cats">
                    <strong>+ {emptyCats.length} categor{emptyCats.length === 1 ? 'y' : 'ies'} awaiting first entry:</strong>{' '}
                    <span className="names">{emptyCats.map((c) => c.name).join(' · ')}</span>
                  </div>
                </div>
              ) : null}
              {isFiltered && selected && pagesByCat[selected] && pagesByCat[selected].length === 0 ? (
                <div className="container empty-search">
                  no entries yet in {categoryById[selected].name}.
                </div>
              ) : null}
            </React.Fragment>
          )}
          <Footer owner={data.owner} />
        </main>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
