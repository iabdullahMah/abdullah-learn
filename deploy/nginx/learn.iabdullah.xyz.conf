# abdullah-learn — nginx vhost for learn.iabdullah.xyz.
#
# Assumes certbot manages the TLS cert. The commented ssl_* lines below
# are filled in by `certbot --nginx` on first run; leave them commented
# in the repo so nginx boots cleanly before the cert exists.
#
# NOTE: the `limit_req_zone` directive lives in nginx.conf's `http { }`
# block, not here — see the comment at the bottom.

server {
    listen 80;
    listen [::]:80;
    server_name learn.iabdullah.xyz;

    # ACME HTTP-01 challenges stay on port 80.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name learn.iabdullah.xyz;

    # --- TLS (certbot will uncomment / manage these) ---
    # ssl_certificate     /etc/letsencrypt/live/learn.iabdullah.xyz/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/learn.iabdullah.xyz/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /opt/learn;
    index index.html;
    charset utf-8;

    access_log /var/log/nginx/learn.access.log;
    error_log  /var/log/nginx/learn.error.log warn;

    client_max_body_size 2m;

    # --- Security headers (apply to every response) ---
    add_header X-Content-Type-Options        "nosniff"                                    always;
    add_header X-Frame-Options               "DENY"                                       always;
    add_header Referrer-Policy               "strict-origin-when-cross-origin"            always;
    add_header Permissions-Policy            "geolocation=(), microphone=(), camera=()"   always;
    add_header Strict-Transport-Security     "max-age=31536000; includeSubDomains"        always;

    # --- Hard denies: never serve deploy configs, git metadata, dotfiles,
    # or the repo README through the web. ---
    location ~ ^/deploy(/|$)   { deny all; return 404; }
    location ~ ^/\.git(/|$)    { deny all; return 404; }
    location ~ /\.(?!well-known) { deny all; return 404; }
    location = /README.md      { deny all; return 404; }

    # --- GitHub webhook (rate-limited; zone declared in nginx.conf) ---
    location = /webhook {
        limit_req zone=learn_webhook burst=4 nodelay;
        proxy_pass http://127.0.0.1:9100/webhook;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }

    # Unauthenticated liveness probe.
    location = /webhook/health {
        proxy_pass http://127.0.0.1:9100/webhook/health;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Caching policy ---
    # The site manifest drives the React app; never let a stale copy stick.
    location = /manifest.json {
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    # PWA manifest has a specific content-type and can be short-cached.
    location = /manifest.webmanifest {
        default_type application/manifest+json;
        add_header Content-Type "application/manifest+json" always;
        add_header Cache-Control "public, max-age=300"      always;
    }

    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
    }

    location ~ \.html$ {
        expires 5m;
        add_header Cache-Control "public, max-age=300" always;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # Custom 404 page.
    error_page 404 /404.html;
}

# Add this to the `http { }` block in /etc/nginx/nginx.conf:
# limit_req_zone $binary_remote_addr zone=learn_webhook:1m rate=2r/s;
